---
# Playbook entry point — 4 plays:
# - k8s_nodes : full bootstrap + backup + monitoring
# - dev_workstations : CLI tools + dev tooling + monitoring
# - libreelec_hosts : appliance-friendly monitoring (no apt, paths under /storage)
# - others : just monitoring (vanilla apt + beszel-agent)

- name: Bootstrap & monitor k8s-node
  hosts: k8s_nodes
  become: true
  gather_facts: true
  vars_files:
    - group_vars/vault.yml
  pre_tasks:
    - name: Show host info
      ansible.builtin.debug:
        msg: "k8s-node play on {{ inventory_hostname }} ({{ ansible_host }}) — arch={{ beszel_arch }}"
  roles:
    - { role: common-cli-tools, tags: [bootstrap, cli-tools] }
    - { role: k8s-node-bootstrap, tags: [bootstrap] }
    - sealed-secrets-backup
    - beszel-agent

- name: Provision dev workstations
  hosts: dev_workstations
  become: true
  gather_facts: true
  vars_files:
    - group_vars/vault.yml
  pre_tasks:
    - name: Show host info
      ansible.builtin.debug:
        msg: "Dev workstation play on {{ inventory_hostname }} ({{ ansible_host }}) — arch={{ beszel_arch }}"
  roles:
    - { role: common-cli-tools, tags: [dev, cli-tools] }
    - { role: dev-workstation, tags: [dev] }
    - beszel-agent

- name: Media / gaming PCs (Jellyfin client + gaming optims + xinput disable)
  hosts: media_pcs
  become: true
  gather_facts: true
  vars_files:
    - group_vars/vault.yml
  pre_tasks:
    - name: Show host info
      ansible.builtin.debug:
        msg: "Media/gaming play on {{ inventory_hostname }} ({{ ansible_host }}) — arch={{ beszel_arch }}"
  roles:
    - { role: common-cli-tools, tags: [media, cli-tools] }
    - { role: media-pc, tags: [media] }
    - beszel-agent

- name: PiHole boxes — monitoring + weekly core update
  hosts: pihole_hosts
  become: true
  gather_facts: true
  vars_files:
    - group_vars/vault.yml
  pre_tasks:
    - name: Show host info
      ansible.builtin.debug:
        msg: "PiHole play on {{ inventory_hostname }} ({{ ansible_host }}) — arch={{ beszel_arch }}"
  roles:
    - beszel-agent
    - pihole-maintenance

- name: Monitor LibreELEC appliances
  hosts: libreelec_hosts
  # No become — root is the SSH user on LibreELEC.
  become: false
  # gather_facts can fail on minimal LibreELEC; we don't need ansible_distribution
  # for our role (we sniff /etc/os-release manually).
  gather_facts: false
  vars_files:
    - group_vars/vault.yml
  pre_tasks:
    - name: Show host info
      ansible.builtin.debug:
        msg: "LibreELEC play on {{ inventory_hostname }} ({{ ansible_host }}) — arch={{ beszel_le_arch }}"
  roles:
    - beszel-agent-libreelec
    - kodi-backup

- name: Deploy Beszel agents on other monitored machines
  hosts: all:!k8s_nodes:!dev_workstations:!media_pcs:!libreelec_hosts:!pihole_hosts
  become: true
  gather_facts: true
  vars_files:
    - group_vars/vault.yml
  pre_tasks:
    - name: Show host info
      ansible.builtin.debug:
        msg: "Monitor-only play on {{ inventory_hostname }} ({{ ansible_host }}) — arch={{ beszel_arch }}"
  roles:
    - beszel-agent
