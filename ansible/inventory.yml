---
# Inventaire des machines monitorées par Beszel + bootstrap k8s-node + dev workstations.
# IPs en clair = LAN privé RFC1918, peu sensible. Pour ajouter une machine :
# 1) ajouter 3 lignes ci-dessous dans le bon groupe, 2) ansible-playbook ... --limit <nouveau-host>

all:
  children:
    # Machines qui hébergent un node Kubernetes — reçoivent common-cli-tools,
    # k8s-node-bootstrap, sealed-secrets-backup, beszel-agent.
    k8s_nodes:
      hosts:
        k8s-node:
          ansible_host: 192.168.88.250
          ansible_connection: local
          ansible_user: moi
          beszel_arch: amd64

    # PC de développement — reçoivent common-cli-tools, dev-workstation, beszel-agent.
    # Note : k8s-node figure ici aussi (l'utilisateur dev dessus) — un host peut
    # appartenir à plusieurs groupes. Les vars restent définies dans k8s_nodes
    # (référence vide ici, Ansible matche par nom de host).
    dev_workstations:
      hosts:
        # k8s-node = pc (poste dev de l'utilisateur, en plus de host k8s)
        k8s-node: {}
        # Linux Mint 22.3 (Ubuntu 24 noble-based) — laptop dev
        work-laptop:
          ansible_host: 192.168.88.211
          ansible_user: moi
          beszel_arch: amd64

    # Appliances LibreELEC (Kodi media center) — read-only FS, root SSH, no apt.
    # Reçoivent uniquement beszel-agent-libreelec (paths /storage/...).
    libreelec_hosts:
      hosts:
        libreelec-tv:
          ansible_host: 192.168.88.202
          ansible_user: root
          beszel_arch: amd64
          beszel_le_arch: amd64

    # PiHole boxes (Raspbian/Debian on Raspberry Pi) — Beszel agent + pihole-maintenance.
    pihole_hosts:
      hosts:
        pihole:
          ansible_host: 192.168.88.203
          ansible_user: pi
          beszel_arch: arm      # Raspberry Pi armv7 32-bit (Pi 1/2/3, or Pi 4 in 32-bit mode)

    # MikroTik RouterOS (hAP ax², RouterOS 7.x) — géré via community.routeros API.
    # API en clair, port 8728. NE PAS inclure dans playbook.yml (bootstrap) :
    # run dédié via routeros.yml.
    #
    # Pourquoi l'API et pas network_cli : bug amont #229 — la détection de prompt
    # network_cli casse car l'identity du routeur contient des caractères spéciaux
    # (`guyader466281@mls.nc` → `@` et `.`). Le mainteneur (felixfontein) utilise
    # lui-même SSH seulement pour bootstrapper l'API, puis l'API uniquement.
    # https://github.com/ansible-collections/community.routeros/issues/229
    #
    # connection: local → les modules api_* se connectent en TCP depuis le
    # controller (pas de session SSH interactive, pas de prompt à scraper).
    routeros_hosts:
      hosts:
        router:
          ansible_host: 192.168.88.1
      vars:
        ansible_connection: local
        # Les modules api_* tournent sur le controller et importent `librouteros`.
        # Forcer l'interpréteur du venv pipx ansible (où librouteros est injecté
        # via `pipx inject ansible librouteros`), sinon l'auto-détection prend
        # python3.14 sans la lib → "Failed to import librouteros".
        ansible_python_interpreter: /home/moi/.local/share/pipx/venvs/ansible/bin/python
        routeros_api_username: admin
        routeros_api_password: "{{ vault_routeros_password }}"

    # Linux Voice Assistant satellites — workstations hébergeant un satellite
    # voice (mic + speaker + wake-word local) via le container OHF-Voice/LVA.
    # Le satellite parle le protocole ESPHome (port 6053) ; HA détecte via
    # l'intégration ESPHome (core). STT/TTS du pipeline Assist sont fournis
    # par les services Wyoming whisper/piper du namespace k8s `voice`.
    # Run uniquement avec `--tags voice` ; pull image docker au premier run.
    voice_satellites:
      hosts:
        # Définition canonique dans dev_workstations ; ref nue ici.
        # Override `lva_user_id` en host_vars si UID ≠ 1000.
        work-laptop: {}

    # Media / gaming PCs — Jellyfin client + Feral gamemode + sysctl tweaks.
    # work-laptop est aussi dans dev_workstations (host dans 2 groupes).
    media_pcs:
      hosts:
        gaming-pc:
          # AM4 (B550M K + R5 5500 + 1050 Ti), 24/7, filaire. Remplace le laptop mort.
          # Overrides matériel/rôles dans host_vars/gaming-pc.yml.
          # mDNS jeux.local (IP DHCP non fixe ; avahi).
          ansible_host: jeux.local
          ansible_user: moi
          beszel_arch: amd64
        # work-laptop : réutilise les vars définies dans dev_workstations
        work-laptop: {}

    # Gaming PCs — game launchers (Lutris + Wine). Séparé de media_pcs : un media
    # PC n'est pas forcément une machine de jeu (work-laptop n'y est PAS).
    # gaming-pc est aussi dans media_pcs (def canonique) → ref nue ici.
    gaming_pcs:
      hosts:
        gaming-pc: {}

  hosts:
    # Machines monitorées uniquement — reçoivent seulement beszel-agent.
    # Décommenter et adapter quand une machine est ajoutée.

    # ha-host:
    #   ansible_host: 192.168.88.200
    #   ansible_user: hass
    #   beszel_arch: amd64

    # pi-salon:
    #   ansible_host: 192.168.88.150
    #   ansible_user: pi
    #   beszel_arch: arm64

  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
