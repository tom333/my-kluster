---
# desktop role — minimal max-perf desktop on Ubuntu Server 24.04 for gaming-pc.
# Use case: Brave (YouTube), Jellyfin Media Player, Lutris. No heavy DE.

# OS guard — this role targets Ubuntu 24.04 (noble) only (glibc 2.39 + nvidia-470).
desktop_required_release: "noble"

# NVIDIA legacy driver for the Kepler GeForce 920M. 470 is the LAST branch for
# Kepler; it only builds against the GA kernel (6.8), NOT the HWE kernel (6.11+)
# — so we pin GA and hold HWE. 26.04 dropped 470 entirely; do not upgrade.
desktop_nvidia_driver: "nvidia-driver-470"
desktop_hold_hwe_kernel: true

# Enable i386 multiarch (32-bit Wine/Steam GL libs; gaming role asserts it).
desktop_enable_i386: true

# Components (toggle off per-host if needed).
desktop_install_brave: true
desktop_install_audio: true        # pipewire + wireplumber
desktop_install_bluetooth: true    # bluez + blueman + BT audio

# CPU tuning.
# desktop_force_cpu_governor: force scaling_governor (bon pour Intel qui bride en
#   powersave). Sur AMD Zen3 (amd_pstate=active) METTRE false : le gouverneur
#   "powersave" y est dynamique (rampe à fond sous charge) — forcer performance
#   24/7 = chaleur/conso inutiles sur un nœud mostly-idle.
desktop_force_cpu_governor: true
desktop_cpu_governor: "performance"
# desktop_cpu_epp: energy_performance_preference (amd_pstate active uniquement).
#   "" = ne pas toucher. "performance" = perf max sous charge + idle sain.
desktop_cpu_epp: ""
# nvidia-patch : retire la limite de sessions NVENC (cartes GTX = 3-5). Optionnel,
#   à ré-appliquer après chaque MAJ driver. Défaut off (biblio maison = souvent OK).
desktop_nvenc_unlimited: false

# --- Optimisations Ubuntu (dé-bloat serveur/cloud + perf) ---
desktop_purge_snapd: true            # aucun snap utilisé (Brave/Lutris/jeux = deb/AppImage/flatpak)
desktop_disable_cloud_init: true     # inutile sur machine physique, ralentit le boot
desktop_disable_oomd: true           # systemd-oomd peut tuer un jeu sous pression (8 Go)
desktop_disable_auto_upgrades: true  # pas de MAJ en pleine partie + protège le kernel GA pinné
desktop_enable_zram: true            # swap compressé (Ubuntu ne l'active pas par défaut)
desktop_zram_percent: 50
desktop_grub_timeout: 2
# Compromis sécu ASSUMÉ : désactive les mitigations CPU (gain réel sur Broadwell i3-5005U,
# PC enfant isolé LAN sans données sensibles).
desktop_disable_cpu_mitigations: true

# Session frontend : 'tint2' (barre + launchers) ou 'pegasus' (frontend canapé type Batocera).
desktop_frontend: "tint2"
# Autologin (kid) vs login mot de passe (défaut = mdp, requis pour un nœud partagé).
desktop_autologin: false
# Verrou écran à l'idle (light-locker) — protège au-delà du login initial.
desktop_screenlock: false

# tint2 launchers (.desktop basenames in /usr/share/applications or ~/.local/share/applications).
desktop_launchers:
  - net.lutris.Lutris
  - com.github.iwalton3.jellyfin-media-player
  - brave-browser

# Pegasus frontend (build stable weekly, x11-static self-contained, URL stable).
desktop_pegasus_url: "https://github.com/mmatyas/pegasus-frontend/releases/download/weekly_2024w38/pegasus-fe_alpha16-82-gc3462e68_x11-static.zip"
