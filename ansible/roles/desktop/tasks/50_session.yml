---
# Openbox session (user autostart + tint2 launchers) + CPU governor.

- name: Ensure user config dirs
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - .config/openbox
    - .config/tint2

- name: Openbox autostart (tint2 + bg + no blank)
  ansible.builtin.template:
    src: openbox-autostart.j2
    dest: "/home/{{ ansible_user }}/.config/openbox/autostart"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: tint2 panel + launchers
  ansible.builtin.template:
    src: tint2rc.j2
    dest: "/home/{{ ansible_user }}/.config/tint2/tint2rc"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
  when: desktop_frontend == 'tint2'

- name: Install light-locker (verrou écran à l'idle)
  ansible.builtin.apt:
    name: light-locker
    state: present
    update_cache: false
  when: desktop_screenlock | bool

- name: CPU tuning service (governor + EPP au boot)
  ansible.builtin.template:
    src: cpu-governor.service.j2
    dest: /etc/systemd/system/cpu-governor.service
    owner: root
    group: root
    mode: '0644'
  when: desktop_force_cpu_governor | bool or (desktop_cpu_epp | length > 0)
  notify: reload systemd (desktop)

- name: Enable + start CPU tuning service
  ansible.builtin.systemd:
    name: cpu-governor.service
    enabled: true
    state: started
    daemon_reload: true
  when:
    - desktop_force_cpu_governor | bool or (desktop_cpu_epp | length > 0)
    - not ansible_check_mode

- name: Remove CPU tuning service if disabled (AMD amd_pstate active gère seul)
  ansible.builtin.systemd:
    name: cpu-governor.service
    enabled: false
    state: stopped
    masked: false
  failed_when: false
  when:
    - not (desktop_force_cpu_governor | bool)
    - desktop_cpu_epp | length == 0
    - not ansible_check_mode
