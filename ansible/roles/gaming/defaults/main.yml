---
# Default variables for the gaming role.

# Install the Lutris game launcher (upstream GitHub release .deb). Toggle off
# per-host if unwanted.
gaming_install_lutris: true

# Lutris version — matches a tag on https://github.com/lutris/lutris/releases
# (asset lutris_<ver>_all.deb). Renovate-trackable. No leading "v".
gaming_lutris_version: "0.5.22"

# 32-bit NVIDIA GL libs for the host's driver branch. Needed by 32-bit Wine
# installers/games (e.g. GOG InnoSetup setup.exe). Must match the installed
# driver branch. Kepler GeForce 920M → 470 legacy. Set to "" to skip.
gaming_nvidia_gl_i386_package: "libnvidia-gl-470:i386"

# OS guard.
gaming_allowed_distros: ["Ubuntu", "Linux Mint", "Bodhi"]

# Jeux natifs apt (universe). Les entrées Lutris restaurées pointent
# /usr/games/<bin> -> ces paquets DOIVENT être présents.
gaming_apt_games:
  - 0ad
  - openarena
  - supertux        # binaire /usr/games/supertux2
  - warzone2100
  - hedgewars
  - supertuxkart
  - lincity-ng
  - widelands
  - jumpnbump
  - gcompris-qt     # éducatif
  - tuxmath
  - tuxpaint
# Steam (multiverse). Game launcher.
gaming_install_steam: true

# --- Bluetooth stability (RTL8723BE combo card on gaming-pc) ---
# BT firmware hangs (hci tx timeout) -> USB reset loop -> controller vanishes.
# Keep the USB BT controller from autosuspending (harmless everywhere).
gaming_btusb_disable_autosuspend: true
# Blacklist the rtl8723be WiFi driver + btcoexist so they stop destabilising the
# shared-antenna BT. WARNING: disables WiFi on the host — only where WiFi unused.
gaming_blacklist_rtl8723_wifi: true
