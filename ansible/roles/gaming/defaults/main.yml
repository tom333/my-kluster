---
# Default variables for the gaming role.

# Install the Lutris game launcher (upstream GitHub release .deb). Toggle off
# per-host if unwanted.
gaming_install_lutris: true

# Lutris version — matches a tag on https://github.com/lutris/lutris/releases
# (asset lutris_<ver>_all.deb). Renovate-trackable. No leading "v".
gaming_lutris_version: "0.5.22"

# 32-bit NVIDIA GL libs for the host's driver branch. Needed by 32-bit Wine
# installers/games (e.g. GOG InnoSetup setup.exe). Must match the installed
# driver branch. Kepler GeForce 920M → 470 legacy. Set to "" to skip.
gaming_nvidia_gl_i386_package: "libnvidia-gl-470:i386"

# OS guard.
gaming_allowed_distros: ["Ubuntu", "Linux Mint", "Bodhi"]
