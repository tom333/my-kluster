---
# Wyoming Satellite — install + systemd user unit.
# Becomes the wyoming_satellite_user via `become_user` so pipx, $HOME, and
# `systemctl --user` all target the right account on a multi-user box.

- name: Install audio + build deps (apt, root)
  ansible.builtin.apt:
    name:
      - alsa-utils         # arecord / aplay (capture + playback CLI)
      - libportaudio2      # PortAudio runtime — sounddevice wheel depends on it
      - portaudio19-dev    # PortAudio headers — sounddevice builds against them
      - python3-dev        # CPython headers for any C extensions
      - build-essential    # gcc / make for sounddevice if no wheel matches
      - git                # pipx git+url install of wyoming-satellite (PyPI stuck at 1.0.0)
    state: present
    update_cache: true

- name: Enable lingering so user systemd survives logout
  ansible.builtin.command: "loginctl enable-linger {{ wyoming_satellite_user }}"
  args:
    creates: "/var/lib/systemd/linger/{{ wyoming_satellite_user }}"
  when: wyoming_satellite_enable_lingering | bool

- name: Ensure satellite home exists
  ansible.builtin.file:
    path: "{{ wyoming_satellite_home }}"
    state: directory
    owner: "{{ wyoming_satellite_user }}"
    group: "{{ wyoming_satellite_user }}"
    mode: "0755"

# Python version pinning, the painful reason it matters here:
#   - System Python on Mint 22.3 is 3.12.
#   - wyoming-openwakeword (every version, 1.0.0 → 1.8.2) hard-depends on
#     `tflite-runtime-nightly`, which only ships wheels for cp39/cp310/cp311.
#   - tflite-runtime stable ships at most cp311 wheels too.
#   - Result: pipx on Python 3.12 fails with "No matching distribution".
# Workaround: use uv (already on the host via dev-workstation role) to install
# CPython 3.11 in user-scope, then point pipx at it.
- name: Install CPython 3.11 via uv (user-scope, no apt PPA)
  become: true
  become_user: "{{ wyoming_satellite_user }}"
  ansible.builtin.command:
    argv:
      - "{{ wyoming_satellite_uv_path | default('/home/' + wyoming_satellite_user + '/.local/bin/uv') }}"
      - python
      - install
      - "3.11"
  register: uv_py_install
  changed_when: "'Installed' in (uv_py_install.stderr or uv_py_install.stdout)"

- name: Resolve uv-managed Python 3.11 path
  become: true
  become_user: "{{ wyoming_satellite_user }}"
  ansible.builtin.command:
    argv:
      - "{{ wyoming_satellite_uv_path | default('/home/' + wyoming_satellite_user + '/.local/bin/uv') }}"
      - python
      - find
      - "3.11"
  register: uv_py_find
  changed_when: false

- name: Set fact — Python 3.11 interpreter path
  ansible.builtin.set_fact:
    wyoming_satellite_python: "{{ uv_py_find.stdout | trim }}"

# pipx is installed by the dev-workstation role (which runs ahead of this
# in the play); we lean on it here to keep the wyoming-satellite venv
# isolated from the user's pip global. --force lets the role be re-run
# to upgrade pinned versions on rerun.
# PyPI's `wyoming-satellite` is stuck at 1.0.0 (Feb 2024); newer tags live on
# GitHub only. We install via a `git+url@<tag>` spec so pipx clones the right
# ref. The shell quoting on the spec matters — keep the entire `name @ url`
# as a single argv element.
# pipx `--force` reuses the existing venv (same Python). When the venv was
# first created against the wrong Python (e.g. system 3.12 on a previous
# run), `--python 3.11` is silently ignored on the re-install. Probe the
# venv's interpreter and uninstall when it doesn't match the target Python.
- name: Probe existing pipx venv Python (if any)
  become: true
  become_user: "{{ wyoming_satellite_user }}"
  ansible.builtin.command:
    cmd: "readlink -f /home/{{ wyoming_satellite_user }}/.local/share/pipx/venvs/wyoming-satellite/bin/python"
  register: pipx_venv_python
  changed_when: false
  failed_when: false

- name: Uninstall stale pipx venv (wrong Python interpreter)
  become: true
  become_user: "{{ wyoming_satellite_user }}"
  ansible.builtin.command:
    argv: [pipx, uninstall, wyoming-satellite]
  when:
    - pipx_venv_python.rc == 0
    - pipx_venv_python.stdout != ""
    - pipx_venv_python.stdout != wyoming_satellite_python
  changed_when: true

- name: Install wyoming-satellite via pipx (user, Python 3.11 from uv, from git tag)
  become: true
  become_user: "{{ wyoming_satellite_user }}"
  ansible.builtin.command:
    argv:
      - pipx
      - install
      - --force
      - --python
      - "{{ wyoming_satellite_python }}"
      - "{{ wyoming_satellite_pip_spec }}"
  register: pipx_satellite_install
  changed_when: "'installed package' in pipx_satellite_install.stdout or 'replaced existing' in pipx_satellite_install.stdout"

- name: Inject openwakeword + sounddevice + wyoming protocol upgrade into satellite venv
  # `wyoming` upgrade is mandatory: wyoming-satellite v1.4.1 source imports
  # `AudioFormat` from wyoming.audio (added in 1.5.x), but its own
  # requirements.txt pins wyoming==1.2.0 — pipx happily resolves the broken
  # combination unless we force-bump it here.
  become: true
  become_user: "{{ wyoming_satellite_user }}"
  ansible.builtin.command:
    cmd: >
      pipx inject wyoming-satellite
      "wyoming=={{ wyoming_protocol_version }}"
      "wyoming-openwakeword=={{ wyoming_openwakeword_version }}"
      "sounddevice"
  register: pipx_inject
  changed_when: "'injected package' in pipx_inject.stdout"
  notify: Restart wyoming-satellite

- name: Ensure user systemd dir exists
  ansible.builtin.file:
    path: "/home/{{ wyoming_satellite_user }}/.config/systemd/user"
    state: directory
    owner: "{{ wyoming_satellite_user }}"
    group: "{{ wyoming_satellite_user }}"
    mode: "0755"

- name: Render systemd user unit
  ansible.builtin.template:
    src: wyoming-satellite.service.j2
    dest: "/home/{{ wyoming_satellite_user }}/.config/systemd/user/wyoming-satellite.service"
    owner: "{{ wyoming_satellite_user }}"
    group: "{{ wyoming_satellite_user }}"
    mode: "0644"
  notify: Restart wyoming-satellite

- name: Reload user systemd + enable + start
  become: true
  become_user: "{{ wyoming_satellite_user }}"
  ansible.builtin.systemd:
    name: wyoming-satellite.service
    scope: user
    daemon_reload: true
    enabled: true
    state: started
  environment:
    # systemd --user needs DBUS_SESSION_BUS_ADDRESS pointing at the user's bus.
    # XDG_RUNTIME_DIR is normally set by login PAM; we set it explicitly so the
    # task works under Ansible (non-interactive) too.
    XDG_RUNTIME_DIR: "/run/user/{{ wyoming_satellite_uid | default(1000) }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ wyoming_satellite_uid | default(1000) }}/bus"
