---
# Defaults for k8s-node-bootstrap role.

# MicroK8s
# WARNING: changing the channel triggers a snap refresh — k8s minor upgrades
# can break CRDs, deprecated APIs, etc. Always bump in lockstep with cluster
# workloads and read MicroK8s release notes first.
microk8s_channel: "1.33/stable"
microk8s_addons:
  - dns
  - ingress
  - hostpath-storage
  - registry
  - gpu
  - helm3

# NFS
nfs_server_ip: "192.168.88.103"
nfs_export: "/Public"
nfs_local_mount: "/mnt/nas"

# Sysctl
sysctl_max_map_count: 262144
sysctl_inotify_max_user_watches: 524288

# Feature flags
gpu_enabled: true

# Hostname guard (override if you renamed your machine)
k8s_node_expected_hostname: "pc"

# Rôle du nœud : "master" (mono-node actuel — enable addons + gpu-operator +
# export kubeconfig) ou "worker" (rejoint le cluster existant : join --worker,
# pas d'addons ni gpu-operator ni kubeconfig).
k8s_node_role: "master"
# Worker : hôte master (nom d'inventaire) d'où déléguer la génération du token
# de join. Défaut = 1er hôte du groupe k8s_nodes.
k8s_join_master_host: "{{ groups['k8s_nodes'][0] | default('k8s-node') }}"

# Worker : tuning kubelet pour un nœud à RAM limitée qui joue parfois.
# Seuils d'éviction plus hauts que le défaut (100Mi = trop tard) + réserve système
# (garde RAM/CPU pour la session graphique/jeu). Args MicroK8s kubelet.
k8s_worker_kubelet_tuning: true
k8s_worker_kubelet_args:
  eviction-hard: "memory.available<500Mi,nodefs.available<10%"
  eviction-soft: "memory.available<1Gi"
  eviction-soft-grace-period: "memory.available=2m"
  eviction-minimum-reclaim: "memory.available=300Mi"
  system-reserved: "memory=1Gi,cpu=500m"
