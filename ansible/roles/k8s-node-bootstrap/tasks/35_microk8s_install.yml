---
# Install MicroK8s (snap) — partagé master + worker.
# Le canal DOIT être identique master/worker pour que le join fonctionne.

- name: Install microk8s via snap
  community.general.snap:
    name: microk8s
    classic: true
    channel: "{{ microk8s_channel }}"
    state: present

- name: Add user to microk8s group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: microk8s
    append: true

# snap → binaire /snap/bin/microk8s ; root n'a pas /snap/bin dans PATH → chemins absolus.
- name: Wait for microk8s ready
  ansible.builtin.command: /snap/bin/microk8s status --wait-ready --timeout=120
  changed_when: false
  check_mode: false
