---
# Master mono-node : enable addons + export kubeconfig.
# (L'install snap + wait-ready sont dans 35_microk8s_install.yml, partagé.)
# Chemins absolus /snap/bin car root n'a pas /snap/bin dans son PATH.

- name: Get currently enabled addons
  ansible.builtin.command: /snap/bin/microk8s status --format yaml
  register: mk8s_status
  changed_when: false
  check_mode: false

- name: Enable each microk8s addon if not already enabled
  ansible.builtin.command: "/snap/bin/microk8s enable {{ item }}"
  loop: "{{ microk8s_addons }}"
  register: enable_result
  changed_when: "'is already enabled' not in (enable_result.stdout | default(''))"
  failed_when:
    - enable_result.rc | default(0) != 0
    - "'is already enabled' not in (enable_result.stdout | default(''))"

- name: Ensure ~/.kube directory exists for user
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0700'

- name: Check if kubectl config exists
  ansible.builtin.stat:
    path: "/home/{{ ansible_user }}/.kube/config"
  register: kubeconfig_stat

- name: Export microk8s config to user kubeconfig
  ansible.builtin.shell:
    cmd: |
      /snap/bin/microk8s config > /home/{{ ansible_user }}/.kube/config
      chown {{ ansible_user }}:{{ ansible_user }} /home/{{ ansible_user }}/.kube/config
      chmod 600 /home/{{ ansible_user }}/.kube/config
  when: not kubeconfig_stat.stat.exists
