---
# Variables globales partagées par toutes les machines du playbook.
# Pas de secrets ici (cf. vault.yml pour les sensibles).
#
# Note : beszel_agent_version / port / user / home sont définis dans
# defaults/main.yml du rôle beszel-agent — pas besoin de les dupliquer ici
# (sinon l'override empêche le bump du rôle de se propager, cf. incident
# d'upgrade Beszel 0.10 → 0.18).

# Référence le secret chiffré dans vault.yml
beszel_hub_ssh_pubkey: "{{ vault_beszel_hub_ssh_pubkey }}"

# Age recipient public key used by sealed-secrets-backup role.
# Private key is OFF-MACHINE (password manager + USB).
# Generated via: age-keygen -o ~/.config/age/sealed-backup.key
sealed_backup_age_pubkey: "age17h4te2ys0jryrecayrygx6qel56yssxhhxkz68l00mreeq3dn4gqmnvlmv"
