apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "arrconf.fullname" . }}
  labels:
    {{- include "arrconf.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  startingDeadlineSeconds: {{ .Values.startingDeadlineSeconds | default 600 }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "arrconf.selectorLabels" . | nindent 12 }}
          annotations:
            checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          containers:
            - name: arrconf
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args: ["--config", "/app/config/arrconf.yml", "apply", "--apps", "sonarr"]
              env:
                - name: TZ
                  value: {{ .Values.timezone | quote }}
                - name: ARRCONF_DRY_RUN
                  value: {{ .Values.arrconfDryRun | quote }}
              envFrom:
                - secretRef:
                    name: {{ .Values.apiKeysSecret }}
              volumeMounts:
                - name: config
                  mountPath: /app/config/arrconf.yml
                  subPath: arrconf.yml
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
          volumes:
            - name: config
              configMap:
                name: {{ include "arrconf.fullname" . }}
