# ============================================================================
# Configarr — configuration as code
# ----------------------------------------------------------------------------
# Source de vérité unique pour la synchronisation TRaSH-Guides / custom
# formats sur Sonarr et Radarr (namespace selfhost).
#
# Édition libre, recharge automatique à chaque run du CronJob.
# Doc : https://configarr.de/docs/intro/
# ============================================================================

trashGuideUrl: https://github.com/TRaSH-Guides/Guides
recyclarrConfigUrl: https://github.com/recyclarr/config-templates

# ============================================================================
# Custom format definitions — pistes audio françaises et bonus codec.
# Reproduit le comportement du Recyclarr précédent en config-as-code pure.
# ============================================================================
customFormatDefinitions:
  # ---------------------------------------------------------------------------
  # Pistes françaises (préférées) — score positif.
  # ---------------------------------------------------------------------------
  - trash_id: fr-vff
    trash_scores:
      default: 150
    name: "FR: VFF / TRUEFRENCH"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: VFF or TRUEFRENCH in release title
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields:
          value: "\\b(VFF|TRUEFRENCH)\\b"

  - trash_id: fr-vfi
    trash_scores:
      default: 150
    name: "FR: VFI"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: VFI in release title
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields:
          value: "\\bVFI\\b"

  - trash_id: fr-vfq
    trash_scores:
      default: 150
    name: "FR: VFQ"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: VFQ in release title
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields:
          value: "\\bVFQ\\b"

  - trash_id: fr-multi
    trash_scores:
      default: 100
    name: "FR: MULTi"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: MULTi in release title
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields:
          value: "\\bMULTI?\\b"

  # ---------------------------------------------------------------------------
  # Sous-titres uniquement (à interdire) — score rédhibitoire.
  # ---------------------------------------------------------------------------
  - trash_id: fr-vostfr
    trash_scores:
      default: -10000
    name: "FR: VOSTFR (subs only)"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: VOSTFR in release title
        implementation: ReleaseTitleSpecification
        negate: false
        required: false
        fields:
          value: "\\bVOSTFR\\b"

  # ---------------------------------------------------------------------------
  # Bonus codec efficace — x265/HEVC en 720p ou 1080p uniquement.
  # En 4K, x265 est la norme et n'a pas besoin de bonus.
  # ---------------------------------------------------------------------------
  - trash_id: fr-x265-hd
    trash_scores:
      default: 500
    name: "x265 / HEVC (HD)"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: x265 / HEVC codec
        implementation: ReleaseTitleSpecification
        negate: false
        required: true
        fields:
          value: "\\b(x265|h\\.?265|hevc)\\b"
      - name: Not 2160p
        implementation: ResolutionSpecification
        negate: true
        required: true
        fields:
          value: 2160

# ============================================================================
# Sonarr — namespace selfhost
# ============================================================================
sonarr:
  main:
    base_url: http://sonarr.selfhost.svc.cluster.local:8989
    api_key: !env SONARR_API_KEY

    quality_definition:
      type: series

    include:
      # Quality definitions Recyclarr (taille des fichiers par tier)
      - template: sonarr-quality-definition-series

    # Profil créé manuellement dans l'UI Sonarr — configarr injecte les CFs et scores.
    quality_profiles:
      - name: MULTi.VF

    custom_formats:
      - trash_ids:
          - fr-vff
          - fr-vfi
          - fr-vfq
          - fr-multi
        assign_scores_to:
          - name: MULTi.VF

      - trash_ids:
          - fr-vostfr
        assign_scores_to:
          - name: MULTi.VF

      - trash_ids:
          - fr-x265-hd
        assign_scores_to:
          - name: MULTi.VF

# ============================================================================
# Radarr — namespace selfhost
# ============================================================================
radarr:
  main:
    base_url: http://radarr.selfhost.svc.cluster.local:7878
    api_key: !env RADARR_API_KEY

    quality_definition:
      type: movie

    include:
      - template: radarr-quality-definition-movie

    quality_profiles:
      - name: MULTi.VF

    custom_formats:
      - trash_ids:
          - fr-vff
          - fr-vfi
          - fr-vfq
          - fr-multi
        assign_scores_to:
          - name: MULTi.VF

      - trash_ids:
          - fr-vostfr
        assign_scores_to:
          - name: MULTi.VF

      - trash_ids:
          - fr-x265-hd
        assign_scores_to:
          - name: MULTi.VF
