{{- if .Values.modelsConfigs }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "localai.fullname" . }}-models-config
  labels:
    {{- include "localai.labels" . | nindent 4 }}
data:
  {{- range $name, $config := .Values.modelsConfigs }}
  {{ $name }}.yaml: |-
{{ $config | indent 4 }}
  {{- end }}
{{- end }}
