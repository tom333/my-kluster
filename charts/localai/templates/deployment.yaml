{{- $persistence := .Values.persistence -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "localai.fullname" . }}
  labels:
    {{- include "localai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "localai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "localai.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/models-config: {{ include (print $.Template.BasePath "/configmap-models.yaml") . | sha256sum }}
    spec:
      {{- if .Values.runtimeClassName }}
      runtimeClassName: {{ .Values.runtimeClassName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.modelsConfigs (index $persistence "models" "enabled") }}
      initContainers:
        # Seed /models with the YAML configs from the ConfigMap. We copy rather
        # than subPath-mount so LocalAI can edit/rewrite files at runtime (UI
        # uploads, gallery installs) without the mount becoming stale.
        - name: models-config-seed
          image: "{{ .Values.modelsInitImage.repository }}:{{ .Values.modelsInitImage.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              for src in /models-configs/*.yaml; do
                [ -e "$src" ] || continue
                cp -fL "$src" "/models/$(basename "$src")"
              done
          volumeMounts:
            - name: models-configs
              mountPath: /models-configs
            - name: models
              mountPath: /models
      {{- end }}
      containers:
      - name: localai
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        {{- range $k, $v := .Values.env }}
        - name: {{ $k }}
          value: {{ $v | quote }}
        {{- end }}
        {{- with .Values.secretEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        startupProbe:
          httpGet:
            path: /readyz
            port: http
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
        livenessProbe:
          httpGet:
            path: /readyz
            port: http
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        {{- range $name, $pvc := $persistence }}
        {{- if $pvc.enabled }}
        - name: {{ $name }}
          mountPath: {{ $pvc.globalMount }}
        {{- end }}
        {{- end }}
      volumes:
      {{- range $name, $pvc := $persistence }}
      {{- if $pvc.enabled }}
      - name: {{ $name }}
        persistentVolumeClaim:
          claimName: {{ include "localai.fullname" $ }}-{{ $name }}
      {{- end }}
      {{- end }}
      {{- if .Values.modelsConfigs }}
      - name: models-configs
        configMap:
          name: {{ include "localai.fullname" . }}-models-config
      {{- end }}
