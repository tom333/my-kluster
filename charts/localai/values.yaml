replicaCount: 1

image:
  repository: localai/localai
  tag: "v4.7.1-gpu-nvidia-cuda-12"
  pullPolicy: IfNotPresent

# Set to "nvidia" only if the GPU operator created a RuntimeClass with that name.
# On MicroK8s with the gpu addon, containerd is configured to use the nvidia runtime
# by default for pods requesting nvidia.com/gpu, so this is usually unnecessary.
runtimeClassName: ""

nodeSelector: {}
tolerations: []
affinity: {}

service:
  type: ClusterIP
  port: 8080

# Map of PVCs. Each entry creates one PVC and mounts it at globalMount in the
# main container. The "models" PVC is required (LocalAI's working directory).
# The "output" PVC is for image/audio generation backends; enable when needed.
persistence:
  models:
    enabled: true
    storageClass: microk8s-hostpath
    size: 50Gi
    accessMode: ReadWriteOnce
    globalMount: /models
  output:
    enabled: true
    storageClass: microk8s-hostpath
    size: 10Gi
    accessMode: ReadWriteOnce
    globalMount: /tmp/generated
  # Persist the backend gallery installs (~1 GB OCI for cuda12-llama-cpp).
  # Without this, every pod restart re-downloads the backend at boot, adding
  # ~10 min to startup. Path discovered empirically: LocalAI v4 installs
  # extracted backends to /backends/<name>/.
  backends:
    enabled: true
    storageClass: microk8s-hostpath
    size: 10Gi
    accessMode: ReadWriteOnce
    globalMount: /backends

# Fix définitif du "Pending Insufficient cpu" au reboot : nœud mono (i5-9400F 6c)
# chroniquement sur-souscrit en requests CPU par des apps idle. Au lieu de rogner
# la request de LocalAI à chaque incident, on lui donne une PriorityClass haute
# (config/priorityclass-localai.yaml) → le scheduler ÉVINCE un pod de priorité
# défaut (0) pour faire tenir LocalAI. LocalAI schedule toujours ; les pods
# système (coredns/traefik = system-*-critical) ne sont jamais touchés.
priorityClassName: localai-high

resources:
  limits:
    # Bumped from cpu:4 / mem:16Gi pour offload MoE (cf. charts/localai/MOE-DEPLOY.md).
    # i5-9400F = 6 cœurs ; les experts MoE tournent CPU-side via override_tensor.
    # mem 56Gi : nœud = 62 GB ; offload experts ~17-21 GB + KV + système.
    cpu: "6"
    memory: 56Gi
    nvidia.com/gpu: 1
  requests:
    # request CPU = plancher de scheduling ; avec la PriorityClass, LocalAI
    # préempte pour tenir donc pas besoin de la rogner. 500m raisonnable.
    cpu: "500m"
    memory: 32Gi
    nvidia.com/gpu: 1

env:
  THREADS: "5"   # i5-9400F 6c ; +1 pour le compute CPU des experts MoE offloadés (laisse 1c système)
  # Default context window for models that don't override it in their YAML.
  # The 7B and Coder configs below specify their own context_size.
  CONTEXT_SIZE: "16384"
  DEBUG: "false"
  MODELS_PATH: "/models"
  # Single GPU (12GB) → un seul modèle résident à la fois. Sans ça, charger un 2e
  # modèle pendant que le 1er occupe la VRAM → cudaMalloc OOM (constaté 2026-07-05
  # au sweep multi-modèles). SINGLE_ACTIVE_BACKEND évince le modèle courant au
  # chargement du suivant (le watchdog idle ne suffit pas : délai 5min).
  LOCALAI_SINGLE_ACTIVE_BACKEND: "true"
  LOCALAI_WATCHDOG_IDLE: "true"
  LOCALAI_WATCHDOG_IDLE_TIMEOUT: "5m"
  # NOTE: LOCALAI_EXTERNAL_BACKENDS volontairement non défini.
  # Les backends (cuda12-llama-cpp + cuda12-diffusers) sont déjà installés dans
  # le PVC /backends. Définir cette env var déclenche un manifest check OCI à
  # chaque boot (Docker Hub puis quay.io, souvent lent ou en timeout) — sans
  # bénéfice puisque les backends sont déjà là.
  # Pour réinstaller un backend (ex: après upgrade LocalAI majeur) :
  # remettre temporairement LOCALAI_EXTERNAL_BACKENDS="llama-cpp,diffusers",
  # supprimer le dossier /backends/<name> concerné, restart le pod, puis
  # retirer à nouveau l'env var.

# Env vars sourced from secrets. Each entry is a standard container env entry
# with valueFrom: { secretKeyRef: ... }.
secretEnv:
  - name: API_KEY
    valueFrom:
      secretKeyRef:
        name: localai-api-key
        key: api-key
  # Example for HuggingFace gated models (Llama, Mistral, etc.):
  - name: HF_TOKEN
    valueFrom:
      secretKeyRef:
        name: huggingface-token
        key: token
  # OpenRouter key consumed by the cloud-proxy backend (deepseek-v4-flash model).
  - name: OPENROUTER_API_KEY
    valueFrom:
      secretKeyRef:
        name: openrouter-api-key
        key: api-key

# Probes — generous startupProbe lets the pod download the model (1+ GB) and
# warm up CUDA on first boot without being killed by liveness. Once startup
# succeeds, liveness takes over with its normal cadence.
probes:
  startup:
    # 30s * 180 = 90 minutes grace window. Generous because the FIRST boot
    # after adding a new backend (e.g. diffusers ~1+ GB OCI) downloads to the
    # ephemeral /tmp before extracting to the /backends PVC. If killed before
    # extraction completes, the next boot starts from zero — vicious cycle.
    # Once the backend is in /backends, subsequent boots are <5 min.
    periodSeconds: 30
    failureThreshold: 180
    timeoutSeconds: 10
  liveness:
    periodSeconds: 30
    failureThreshold: 3
    timeoutSeconds: 10
  readiness:
    periodSeconds: 15
    failureThreshold: 3
    timeoutSeconds: 10

# Image used by the init container that seeds /models with the YAML configs
# below. Any minimal image with `cp` and `sh` works.
modelsInitImage:
  repository: busybox
  tag: "1.38"

# Model configurations rendered into a ConfigMap, then copied at pod start by
# an initContainer into the persistent /models directory. Each key becomes a
# file <key>.yaml that LocalAI reads on boot.
modelsConfigs:
  # ~1 GB VRAM. Kept around for quick smoke tests and ultra-low-latency replies.
  qwen2.5-1.5b-instruct: |
    name: qwen2.5-1.5b-instruct
    backend: llama-cpp
    context_size: 4096
    gpu_layers: 99
    f16: true
    flash_attention: true
    mmap: true
    parameters:
      model: qwen2.5-1.5b-instruct-q4_k_m.gguf
      temperature: 0.7
      top_p: 0.9
      top_k: 40
    download_files:
      - filename: qwen2.5-1.5b-instruct-q4_k_m.gguf
        uri: https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF/resolve/main/qwen2.5-1.5b-instruct-q4_k_m.gguf
    # Template custom retiré 2026-07-05 : produisait une sortie VIDE (ctok=0 au
    # bench) — le `<|im_start|>assistant` sans \n final cassait le format ChatML.
    # On délègue au template jinja embarqué du GGUF (comme qwen2.5-7b).
    options:
      - use_jinja:true
    template:
      use_tokenizer_template: true
    function:
      automatic_tool_parsing_fallback: true
      grammar:
        disable: true
    stopwords:
      - "<|im_end|>"
      - "<|endoftext|>"

  # ~10 GB VRAM at ctx=32k (native Qwen 2.5 7B window), with flash_attention.
  # Bumped from 16k → 32k so Hermes Agent (which needs a 64k-declared ctx,
  # compresses at threshold=0.5 → ~32k real tokens) doesn't overflow on big
  # system prompts (skills index + persona = ~16k baseline).
  # Tool-calling enabled via llama.cpp jinja runtime + GGUF embedded
  # Hermes-style chat template (pattern from mudler/LocalAI gallery qwen3.yaml).
  qwen2.5-7b-instruct: |
    name: qwen2.5-7b-instruct
    backend: llama-cpp
    known_usecases:
      - chat
    context_size: 32768
    gpu_layers: 99
    f16: true
    flash_attention: true
    mmap: true
    parameters:
      model: qwen2.5-7b-instruct-q4_k_m.gguf
      temperature: 0.7
      top_p: 0.9
      top_k: 40
    download_files:
      # The official Qwen GGUF repo shards Q4_K_M in two files. Bartowski
      # republishes a single-file version — simpler to manage in LocalAI.
      - filename: qwen2.5-7b-instruct-q4_k_m.gguf
        uri: https://huggingface.co/bartowski/Qwen2.5-7B-Instruct-GGUF/resolve/main/Qwen2.5-7B-Instruct-Q4_K_M.gguf
    options:
      - use_jinja:true
    template:
      use_tokenizer_template: true
    function:
      automatic_tool_parsing_fallback: true
      grammar:
        disable: true
    stopwords:
      - "<|im_end|>"
      - "<|endoftext|>"

  # Qwen3 8B — Hermes Agent's recommended local-tier model for tool calling
  # (per https://www.remoteopenclaw.com/blog/best-free-models-for-hermes,
  # "Best for 8 GB VRAM, reliable tool calling"). Different generation than
  # Qwen2.5 — Qwen3 has hybrid thinking/non-thinking modes and was retrained
  # with stronger function-call coverage.
  #
  # ~5 GB Q4_K_M + KV cache. Native 32k ctx (kept at 32k here; Qwen3 supports
  # YaRN to 128k but VRAM budget on RTX 3060 12 GB is tight at 32k already).
  #
  # Thinking mode is OFF by default in our chat template: thinking burns
  # tokens that the Hermes 16k+ system prompt can't afford. To switch it on
  # ad-hoc, send the request with `extra_body: {chat_template_kwargs:
  # {enable_thinking: true}}`.
  qwen3-8b: |
    name: qwen3-8b
    backend: llama-cpp
    known_usecases:
      - chat
    # Qwen3-8B native context per HuggingFace = 40960. Set to 65536 with YaRN
    # rope-scaling (2× extension) to handle Hermes cron jobs that accumulate
    # 13+ browser_snapshot tool results (~30k tokens of HTML each run) before
    # compression kicks in. The previous 32768 ceiling overflowed at 55k tokens
    # on the NC job-hunt cron.
    # VRAM budget on RTX 3060 12GB with Q4_K_M model + Q8_0 KV cache:
    #   - 32k KV q8_0: ~3.0 GB
    #   - 64k KV q8_0: ~6.0 GB
    #   - 5 GB weights + 6 GB KV + 1 GB activation = ~12 GB — fits, tight.
    # If we OOM, fall back to context_size: 40960 (native, no YaRN), or
    # switch cache_type_v: q4_0 to halve V-cache size at minor quality cost.
    context_size: 65536
    gpu_layers: 99
    f16: true
    flash_attention: true
    mmap: true
    # KV cache quantization (q8_0 = 50% smaller KV cache vs FP16, near-lossless).
    # Critical at 64k context — drops KV from 12 GB FP16 to 6 GB.
    # Requires flash_attention: true above (without flash-attn, llama.cpp
    # silently downgrades quantized KV to FP16 and OOMs).
    cache_type_k: q8_0
    cache_type_v: q8_0
    parameters:
      model: Qwen3-8B-Q4_K_M.gguf
      temperature: 0.7
      top_p: 0.8
      top_k: 20
    download_files:
      - filename: Qwen3-8B-Q4_K_M.gguf
        uri: https://huggingface.co/Qwen/Qwen3-8B-GGUF/resolve/main/Qwen3-8B-Q4_K_M.gguf
    options:
      - use_jinja:true
      # Pass chat_template kwarg to disable Qwen3's <think> mode at boot.
      # The bundled Qwen3 jinja template honours enable_thinking; off keeps
      # the model in fast-response mode (no <think>...</think> preamble).
      - "chat_template_kwargs:{\"enable_thinking\":false}"
      # YaRN rope scaling — extends Qwen3-8B's native 40960 ctx to 65536
      # (2× factor). yarn_orig_ctx matches the model's training ctx so the
      # interpolation is calibrated correctly. Per Qwen team, YaRN at 2×
      # is near-lossless on the 0–32k range and acceptable for 32–64k.
      - "rope_scaling:yarn"
      - "rope_freq_scale:0.5"
      - "yarn_orig_ctx:40960"
    template:
      use_tokenizer_template: true
    function:
      automatic_tool_parsing_fallback: true
      grammar:
        disable: true
    stopwords:
      - "<|im_end|>"
      - "<|endoftext|>"
  # gemma-4-12B-it QAT — DENSE 12B multimodal, full-GPU (PAS d'offload RAM,
  # contraste avec le MoE qwen3.6). QAT (quant-aware training Google) → qualité
  # ≈ bf16 à la taille d'un Q4. Tient sur la 3060 : 6.72GB (Q4_K_XL) + 0.25GB
  # draft MTP + 0.18GB mmproj + KV ≈ 8-9GB.
  #
  # MTP (multi-token prediction / speculative decoding) : drafter dans un fichier
  # SÉPARÉ (≠ schéma Qwen embarqué). draft_model pointe le GGUF MTP Q4_0
  # (near-lossless, recommandé par le README unsloth). Requiert un build llama.cpp
  # post-2026-06-07 (PR ggml-org/llama.cpp#23398) — notre backend cuda12-llama-cpp
  # `latest` installé le 18-06 le couvre ; le core v4.3.6 expose déjà draft_model.
  #
  # Vision native via mmproj (passer screenshots browser en image).
  # ⚠️ tool-calling gemma = "day-1" (moins mûr que Qwen pour les crons Hermes) :
  # plutôt modèle général + vision que workhorse agent.
  # Format chat : gemma (<start_of_turn> / <end_of_turn>).
  gemma-4-12b-it-qat: |
    name: gemma-4-12b-it-qat
    backend: llama-cpp
    known_usecases:
      - chat
    context_size: 32768          # gemma-4 = 128k natif ; capé pour la VRAM
    gpu_layers: 99
    f16: true
    flash_attention: true
    mmap: false
    cache_type_k: q8_0
    cache_type_v: q8_0
    mmproj: mmproj-BF16.gguf                    # projecteur vision
    draft_model: mtp-gemma-4-12B-it.gguf        # drafter MTP canonique (docs Unsloth)
    parameters:
      model: gemma-4-12B-it-qat-UD-Q4_K_XL.gguf
      temperature: 1.0           # défauts gemma
      top_p: 0.95
      top_k: 64
    download_files:
      - filename: gemma-4-12B-it-qat-UD-Q4_K_XL.gguf
        uri: https://huggingface.co/unsloth/gemma-4-12B-it-qat-GGUF/resolve/main/gemma-4-12B-it-qat-UD-Q4_K_XL.gguf
      - filename: mtp-gemma-4-12B-it.gguf
        uri: https://huggingface.co/unsloth/gemma-4-12B-it-qat-GGUF/resolve/main/mtp-gemma-4-12B-it.gguf
      - filename: mmproj-BF16.gguf
        uri: https://huggingface.co/unsloth/gemma-4-12B-it-qat-GGUF/resolve/main/mmproj-BF16.gguf
    options:
      - use_jinja:true
      # NB : gemma-4-it raisonne par défaut (préambule reasoning) — BON pour
      # chat/coding, on le GARDE. Testé 2026-07-05 : le template GGUF unsloth
      # n'expose PAS de toggle enable_thinking (no-op), et le reasoning NE bloque
      # PAS les tool-calls (tool_ok=100% sur S1 avec reasoning actif). Le fail
      # Hermes venait du dépassement de contexte (>32k), pas du reasoning.
      # MTP / speculative decoding (drafter = draft_model ci-dessus)
      # Sweep mesuré sur RTX 3060 (acceptation MTP ~0.525) :
      #   n_max=2 → 46 tok/s interne (34.6 wall)  ← optimal
      #   n_max=4 → 42.87 tok/s interne (31.4 wall) — pire (têtes MTP gemma
      #             prédisent ~2 tokens fiables ; au-delà = drafts rejetés).
      # MTP donne ~1.5x vs baseline ; le >2x annoncé suppose un GPU datacenter.
      - spec_type:draft-mtp
      - draft_max:2
    template:
      use_tokenizer_template: true
    function:
      automatic_tool_parsing_fallback: true
      grammar:
        disable: true
    stopwords:
      - "<end_of_turn>"
      - "<eos>"

  # gemma-4-26B-A4B heretic (SC117) — MoE 26B / 4B actifs, "uncensored" via
  # Heretic (abliteration optimisée p-e-w : retire les refus avec moins de dégâts
  # de capacité que l'abliteration brute). Remplace l'ancien gemma-4-12b-abliterated.
  #
  # MoE → experts offloadés en RAM (override_tensor, comme qwen3.6-35b-a3b) ;
  # attention/denses sur GPU. UD-Q4_K_XL 14.25GB (quant Unsloth Dynamic → atténue
  # le creux qualité MoE-Q4) + mmproj 1.19GB. Tient en RAM (62GB), fit GPU via --fit.
  #
  # ⚠️ PAS de MTP : aucun repo heretic ne fournit le draft `gemma4_assistant`
  # (seul l'unsloth officiel l'a). Donc pas de spec-decode ici.
  # ⚠️ Débit attendu MODESTE sur ce nœud : MoE offloadé = CPU/RAM-bound, et notre
  # i5-9400F + DDR4 est faible (~15-25 tok/s estimé, vs ~30 sur i7-12700KF+DDR5).
  # ⚠️ Modèle sans garde-fous (RP/usage voulu). Vision native (mmproj).
  gemma-4-26b-a4b-heretic: |
    name: gemma-4-26b-a4b-heretic
    backend: llama-cpp
    known_usecases:
      - chat
    context_size: 32768
    gpu_layers: 99
    f16: true
    flash_attention: true
    mmap: false
    cache_type_k: q8_0
    cache_type_v: q8_0
    mmproj: gemma-4-26b-a4b-heretic-mmproj.gguf
    parameters:
      model: gemma-4-26b-a4b-heretic-UD-Q4_K_XL.gguf
      temperature: 1.0
      top_p: 0.95
      top_k: 64
    download_files:
      - filename: gemma-4-26b-a4b-heretic-UD-Q4_K_XL.gguf
        uri: https://huggingface.co/SC117/gemma-4-26B-A4B-it-qat-heretic-GGUF/resolve/main/gemma-4-26B-A4B-it-qat-heretic-UD-Q4_K_XL.gguf
      - filename: gemma-4-26b-a4b-heretic-mmproj.gguf
        uri: https://huggingface.co/SC117/gemma-4-26B-A4B-it-qat-heretic-GGUF/resolve/main/mmproj-gemma-4-26B-A4B-it-qat-heretic-F16.gguf
    options:
      - use_jinja:true
      # MoE : experts offloadés RAM via override_tensor — REQUIS sur notre LocalAI.
      # Testé 2026-07-04 : fit:on SEUL (sans -ot) tente un full-GPU load ~13.5GB →
      # cudaMalloc OOM (GPU ~10.6GB libre, desktop KDE prend 1.4GB). Le "fit-only
      # ~44 tok/s" du bench carteakey.dev suppose mainline llama-server headless +
      # full-12GB, NON reproductible sur ce wrapper LocalAI + GPU partagé desktop.
      # Baseline mesurée avec -ot : ~16.2 tok/s (S0). fit_target:2048 = headroom mmproj.
      - "override_tensor:\\.ffn_.*_exps\\.=CPU"
      - fit:on
      - fit_target:2048
    template:
      use_tokenizer_template: true
    function:
      automatic_tool_parsing_fallback: true
      grammar:
        disable: true
    stopwords:
      - "<end_of_turn>"
      - "<eos>"
  # DeepSeek-V4-Flash via OpenRouter — backend cloud-proxy (passthrough).
  # PAS de modèle local : LocalAI forwarde le body client tel quel vers
  # OpenRouter (wire format OpenAI chat-completions). Bypasse templating /
  # MCP / loader local. Ne consomme NI GPU NI RAM du nœud — coexiste sans
  # conflit avec le MoE qwen3.6 et les modèles llama-cpp.
  #
  # Usage : fallback gros modèle distant sous le même endpoint OpenAI que nos
  # modèles GPU (base_url localai.tgu.ovh inchangé côté client / Hermes).
  # Le backend cloud-proxy est compilé dans l'image LocalAI (pas une install
  # gallery) — dispo depuis v4.3.6.
  #
  # Clé : OPENROUTER_API_KEY (secretEnv ci-dessus → SealedSecret
  # openrouter-api-key). upstream_model = slug canonique OpenRouter.
  # Filtre PII activé par défaut sur le flux SSE upstream.
  deepseek-v4-flash: |
    name: deepseek-v4-flash
    backend: cloud-proxy
    proxy:
      mode: passthrough
      provider: openai
      upstream_url: https://openrouter.ai/api/v1/chat/completions
      api_key_env: OPENROUTER_API_KEY
      upstream_model: deepseek/deepseek-v4-flash
      request_timeout_seconds: 120
    pii:
      enabled: true
  qwen3-coder-30b-a3b-instruct: |
    name: qwen3-coder-30b-a3b-instruct
    backend: llama-cpp
    known_usecases: [chat]
    context_size: 8192
    gpu_layers: 99
    f16: true
    flash_attention: true
    mmap: true
    cache_type_k: q8_0
    cache_type_v: q8_0
    parameters:
      model: Qwen3-Coder-30B-A3B-Instruct-UD-IQ1_S.gguf
      temperature: 0.6
      top_p: 0.95
      top_k: 20
    download_files:
      - filename: Qwen3-Coder-30B-A3B-Instruct-UD-IQ1_S.gguf
        uri: https://huggingface.co/unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF/resolve/main/Qwen3-Coder-30B-A3B-Instruct-UD-IQ1_S.gguf
    options:
      - use_jinja:true
    function:
      automatic_tool_parsing_fallback: true
      grammar:
        disable: true
    template:
      use_tokenizer_template: true
    stopwords:
      - "<|im_end|>"
      - "<|endoftext|>"

  # Black Forest Labs Flux.2 Klein, smaller 4B variant.
  # Chosen over the 9B variants because:
  #  - 4B has a complete Diffusers-format repo (model_index.json + text_encoder/
  #    + vae/ + transformer/) → loadable via FluxPipeline.from_pretrained()
  #  - 9B variants are gated on HuggingFace (would need HF_TOKEN secret)
  #  - The 9B-kv-fp8 repo is a single-file safetensors, NOT Diffusers format
  #
  # VRAM: ~7-8 GB with CPU offload of the T5 text encoder.
  # First call downloads ~15 GB from HF — long on slow links; subsequent calls
  # are cached in the HuggingFace cache dir.
  # Outputs land in /tmp/generated (persistence.output PVC).
  #
  # Invoked via the OpenAI-compatible endpoint:
  #   POST /v1/images/generations
  #   { "model": "flux.2-klein", "prompt": "...", "size": "1024x1024", "n": 1 }
  flux.2-klein: |
    name: flux.2-klein
    backend: diffusers
    parameters:
      model: black-forest-labs/FLUX.2-klein-4B
    diffusers:
      pipeline_type: FluxPipeline
      cuda: true
      enable_parameters: "num_inference_steps,guidance_scale,width,height,seed"
      cpu_offload: true
    step: 4
    f16: true
    low_vram: true

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.middlewares: localai-lan-only@kubernetescrd
  hosts:
    - host: localai.tgu.ovh
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: localai-tls
      hosts:
        - localai.tgu.ovh
