# Namespace crowdsec créé ici (par l'app "sealed") pour que le SealedSecret →
# Secret puisse être déchiffré dedans avant que l'app crowdsec ne démarre.
---
apiVersion: v1
kind: Namespace
metadata:
  name: crowdsec
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: crowdsec-keys
  namespace: crowdsec
spec:
  encryptedData:
    BOUNCER_KEY_traefik: 
  template:
    metadata:
      creationTimestamp: null
      name: crowdsec-keys
      namespace: crowdsec
