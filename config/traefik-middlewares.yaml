# Traefik Middlewares — migration ingress-nginx → Traefik (2026-06).
# Déployés par l'app ArgoCD "config". Chaque Middleware vit dans le ns de l'app
# qui le consomme (cross-namespace interdit par défaut côté Traefik).
#
# Attachement depuis un Ingress :
#   traefik.ingress.kubernetes.io/router.middlewares: <ns>-<name>@kubernetescrd
#
# ipAllowList  : remplace nginx whitelist-source-range (LAN-only)
# forwardAuth  : remplace nginx auth-url/auth-signin (oauth2-proxy)
#   NB: pas de authSigninURL (champ absent du CRD Traefik OSS v3.6) → non
#   authentifié = HTTP 401 (bloqué). Redirection login à ajouter ultérieurement.
# ============================================================================

# ─── IPAllowList LAN : searxng, monitoring, hermes, localai, openwebui ───────
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-only
  namespace: searxng
spec:
  ipAllowList:
    sourceRange: ["192.168.88.0/24", "10.1.0.0/16"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-only
  namespace: monitoring
spec:
  ipAllowList:
    sourceRange: ["192.168.88.0/24", "10.1.0.0/16"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-only
  namespace: hermes
spec:
  ipAllowList:
    sourceRange: ["192.168.88.0/24", "10.1.0.0/16"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-only
  namespace: localai
spec:
  ipAllowList:
    sourceRange: ["192.168.88.0/24", "10.1.0.0/16"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-only
  namespace: openwebui
spec:
  ipAllowList:
    sourceRange: ["192.168.88.0/24", "10.1.0.0/16"]

# ─── ForwardAuth oauth2-proxy : kube-system, dagster, openwebui, selfhost ────
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-forwardauth
  namespace: kube-system
spec:
  forwardAuth:
    address: https://auth.tgu.ovh/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders: ["X-Auth-Request-User", "X-Auth-Request-Email", "Authorization"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-forwardauth
  namespace: dagster
spec:
  forwardAuth:
    address: https://auth.tgu.ovh/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders: ["X-Auth-Request-User", "X-Auth-Request-Email", "Authorization"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-forwardauth
  namespace: openwebui
spec:
  forwardAuth:
    address: https://auth.tgu.ovh/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders: ["X-Auth-Request-User", "X-Auth-Request-Email", "Authorization"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-forwardauth
  namespace: selfhost
spec:
  forwardAuth:
    address: https://auth.tgu.ovh/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders: ["X-Auth-Request-User", "X-Auth-Request-Email", "Authorization"]
