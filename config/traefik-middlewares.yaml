# Traefik Middlewares — migration ingress-nginx → Traefik (2026-06).
# Déployés par l'app ArgoCD "config". Chaque Middleware vit dans le ns de l'app
# qui le consomme (cross-namespace interdit par défaut côté Traefik).
#
# Attachement depuis un Ingress :
#   traefik.ingress.kubernetes.io/router.middlewares: <ns>-<name>@kubernetescrd
#
# ipAllowList  : remplace nginx whitelist-source-range (LAN-only)
# forwardAuth  : remplace nginx auth-url/auth-signin (oauth2-proxy)
#   address = RACINE du service oauth2-proxy (pas /oauth2/auth) + upstreams=static://202
#   + skip_provider_button=true côté oauth2-proxy → authentifié=202 (accès),
#   non-authentifié navigateur=302 vers GitHub (ForwardAuth transmet le redirect).
#   Pattern doc oauth2-proxy "Traefik ForwardAuth with static upstreams".
# ============================================================================

# ─── IPAllowList LAN : searxng, monitoring, hermes, localai, openwebui ───────
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-only
  namespace: searxng
spec:
  ipAllowList:
    sourceRange: ["192.168.88.0/24", "10.1.0.0/16"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-only
  namespace: monitoring
spec:
  ipAllowList:
    sourceRange: ["192.168.88.0/24", "10.1.0.0/16"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-only
  namespace: hermes
spec:
  ipAllowList:
    sourceRange: ["192.168.88.0/24", "10.1.0.0/16"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-only
  namespace: localai
spec:
  ipAllowList:
    sourceRange: ["192.168.88.0/24", "10.1.0.0/16"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-only
  namespace: openwebui
spec:
  ipAllowList:
    sourceRange: ["192.168.88.0/24", "10.1.0.0/16"]

# ─── ForwardAuth oauth2-proxy : kube-system, dagster, openwebui, selfhost ────
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-forwardauth
  namespace: kube-system
spec:
  forwardAuth:
    address: http://oauth2-proxy.kube-system.svc.cluster.local/
    trustForwardHeader: true
    authResponseHeaders: ["X-Auth-Request-User", "X-Auth-Request-Email", "Authorization"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-forwardauth
  namespace: dagster
spec:
  forwardAuth:
    address: http://oauth2-proxy.kube-system.svc.cluster.local/
    trustForwardHeader: true
    authResponseHeaders: ["X-Auth-Request-User", "X-Auth-Request-Email", "Authorization"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-forwardauth
  namespace: openwebui
spec:
  forwardAuth:
    address: http://oauth2-proxy.kube-system.svc.cluster.local/
    trustForwardHeader: true
    authResponseHeaders: ["X-Auth-Request-User", "X-Auth-Request-Email", "Authorization"]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-forwardauth
  namespace: selfhost
spec:
  forwardAuth:
    address: http://oauth2-proxy.kube-system.svc.cluster.local/
    trustForwardHeader: true
    authResponseHeaders: ["X-Auth-Request-User", "X-Auth-Request-Email", "Authorization"]

# ─── Sablier scale-to-zero (Phase 6) ─────────────────────────────────────────
# Attaché à l'ingress du service candidat. names=deployment_<ns>_<nom>_<replicas>.
# dynamic = page d'attente navigateur pendant le réveil (0→N). Scale-to-zero
# auto après sessionDuration sans requête. Serveur : sablier.kube-system:10000.
# Pilote : mlflow (ia-lab).
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mlflow-sablier
  namespace: ia-lab
spec:
  plugin:
    sablier:
      names: deployment_ia-lab_mlflow_1
      sablierUrl: http://sablier.kube-system:10000
      sessionDuration: 10m
      dynamic:
        displayName: MLflow
        theme: ghost
        refreshFrequency: 5s
---
# openwebui = StatefulSet (names statefulset_...). Chaîné APRÈS oauth/whitelist
# sur les 2 ingress (chat + chat-lan) → seuls les requêtes autorisées réveillent.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: openwebui-sablier
  namespace: openwebui
spec:
  plugin:
    sablier:
      names: statefulset_openwebui_openwebui-open-webui_1
      sablierUrl: http://sablier.kube-system:10000
      sessionDuration: 30m
      dynamic:
        displayName: Open WebUI
        theme: ghost
        refreshFrequency: 5s
---
# ─── CrowdSec bouncer (IPS) ──────────────────────────────────────────────────
# Bloque (403) les IPs bannies par CrowdSec (scans/bruteforce détectés sur les
# access logs Traefik + blocklist communautaire CAPI). Mode stream (pull
# périodique des décisions, faible latence). Clé lue depuis le fichier monté.
# Attaché GLOBALEMENT via ports.websecure.middlewares (cf. traefik-app.yaml) en
# Phase C, une fois ce middleware validé sain.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: crowdsec
  namespace: ingress
spec:
  plugin:
    bouncer:
      enabled: true
      crowdsecMode: stream
      crowdsecLapiScheme: http
      crowdsecLapiHost: crowdsec-service.crowdsec.svc.cluster.local:8080
      crowdsecLapiPath: "/"
      crowdsecLapiKeyFile: /etc/traefik/crowdsec/BOUNCER_KEY_traefik
---
# dagster : SEULEMENT le webserver (UI). Le daemon reste up (schedules/runs).
# NE PAS scale-to-zero dagster-user-deployment-accidents (poll gRPC interne du
# daemon → Sablier ne peut pas le réveiller, code-location casse).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dagster-sablier
  namespace: dagster
spec:
  plugin:
    sablier:
      names: deployment_dagster_dagster-dagster-webserver_1
      sablierUrl: http://sablier.kube-system:10000
      sessionDuration: 15m
      dynamic:
        displayName: Dagster
        theme: ghost
        refreshFrequency: 5s
---
# portfolio (Streamlit, ns portfolio, déployé manuellement). Site public → page
# d'attente au réveil. Ingress géré dans le repo portfolio (k8s/ingress.yaml).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: portfolio-sablier
  namespace: portfolio
spec:
  plugin:
    sablier:
      names: deployment_portfolio_portfolio_1
      sablierUrl: http://sablier.kube-system:10000
      sessionDuration: 20m
      dynamic:
        displayName: Portfolio
        theme: ghost
        refreshFrequency: 5s
---
# accidents (Helm chart meteo-accidents-nc, déployé manuellement). Réveil de GROUPE :
# accidents-app (ingress meteo) + accidents-api + streamlit-app (deps internes
# ClusterIP) montent ENSEMBLE, sinon l'app réveillée appelle une api endormie.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: accidents-sablier
  namespace: accidents
spec:
  plugin:
    sablier:
      names: deployment_accidents_accidents-app_1,deployment_accidents_accidents-api_1,deployment_accidents_streamlit-app_1
      sablierUrl: http://sablier.kube-system:10000
      sessionDuration: 20m
      dynamic:
        displayName: Météo des accidents
        theme: ghost
        refreshFrequency: 5s
