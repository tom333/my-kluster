apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: kube-system
    server: https://kubernetes.default.svc
  project: infra-project
  source:
    path: ""
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    targetRevision: 2.16.2
    chart: sealed-secrets
    helm:
      values: |
        fullnameOverride: sealed-secrets
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        metrics:
          serviceMonitor:
            enabled: false
        keyrenewperiod: "720h"
        rbac:
          create: true
          pspEnabled: false
        networkPolicy:
          enabled: false
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      selfHeal: true
      prune: true
