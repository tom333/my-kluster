apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # Pred — planif de repas + suivi de régime (Django + HTMX), foyer 2 pers.
  # Image custom buildée localement → registry localhost:32000 (pas de CI distante : le
  # registry n'est joignable que sur le LAN). SQLite mono-fichier persistant sur PVC
  # microk8s-hostpath (local : pas de locking NFS). La base seed (catalogue CIQUAL + plats
  # + classif) est embarquée dans l'image ; l'entrypoint la copie sur le PVC au 1er boot.
  # Auth = login Django (un compte par mangeur) → PAS d'oauth2-proxy devant.
  # LLM (décompo de plats, admin) → service LocalAI in-cluster.
  # CronJob garmin-import : ingestion quotidienne Garmin Connect (SP4) → mêmes PVC/image.
  # NB : le package Django interne reste « marmite » (app_label / tables marmite_*) ; seul
  # l'habillage produit + l'infra sont « Pred ».
  name: pred
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: selfhost
    server: https://kubernetes.default.svc
  project: selfhost-project
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      values: |
        controllers:
          pred:
            type: deployment
            containers:
              main:
                image:
                  repository: localhost:32000/pred
                  tag: "0.2.5"
                  pullPolicy: IfNotPresent
                env:
                  DEBUG: "0"
                  ALLOWED_HOSTS: pred.tgu.ovh
                  CSRF_TRUSTED_ORIGINS: https://pred.tgu.ovh
                  DB_PATH: /data/db.sqlite3
                  # LLM (décompo plats) → LocalAI in-cluster (ns localai, port 8080).
                  LLM_BASE_URL: http://localai.localai:8080/v1
                envFrom:
                  - secretRef:
                      name: pred-secrets   # SECRET_KEY (scellé)
                probes:
                  # Host header des probes = IP du pod (hors ALLOWED_HOSTS) → probe TCP, pas HTTP.
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      tcpSocket: { port: 8000 }
                      initialDelaySeconds: 15
                      periodSeconds: 20
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      tcpSocket: { port: 8000 }
                      initialDelaySeconds: 10
                      periodSeconds: 10
                resources:
                  requests: { cpu: "100m", memory: 256Mi }
                  limits:   { cpu: "1",    memory: 512Mi }
          # Ingestion Garmin quotidienne (SP4). Incrémental : utilise le GarminAccount
          # existant (créé au 1er backfill manuel). Jeton garth réutilisé depuis /data/garth.
          garmin-import:
            type: cronjob
            cronjob:
              schedule: "0 5 * * *"
              timeZone: Pacific/Noumea
              concurrencyPolicy: Forbid
              backoffLimit: 1
              successfulJobsHistory: 3
              failedJobsHistory: 3
            containers:
              main:
                image:
                  repository: localhost:32000/pred
                  tag: "0.2.5"
                  pullPolicy: IfNotPresent
                command: ["python", "manage.py", "import_garmin"]
                env:
                  DEBUG: "0"
                  DB_PATH: /data/db.sqlite3
                  GARMIN_TOKEN_DIR: /data/garth
                envFrom:
                  - secretRef:
                      name: pred-secrets   # SECRET_KEY (settings Django)
                  - secretRef:
                      name: pred-garmin    # GARMIN_EMAIL / GARMIN_PASSWORD (à sceller, cf. README)
                resources:
                  requests: { cpu: "50m", memory: 128Mi }
                  limits:   { cpu: "1",   memory: 512Mi }
        service:
          main:
            controller: pred
            ports:
              http:
                port: 8000
                targetPort: 8000
        ingress:
          main:
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - host: pred.tgu.ovh
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: main
                      port: http
            tls:
              - hosts: [pred.tgu.ovh]
                secretName: pred-tls
        persistence:
          # SQLite mono-fichier : volume LOCAL (hostpath) → pas de locking NFS. Survit aux
          # redéploiements ; seedé au 1er boot par l'entrypoint si vide. Monté aussi par le
          # CronJob garmin-import (même nœud single-node → RWO OK) : SQLite + jeton garth.
          data:
            type: persistentVolumeClaim
            accessMode: ReadWriteOnce
            size: 1Gi
            storageClass: microk8s-hostpath
            advancedMounts:
              pred:
                main:
                  - path: /data
              garmin-import:
                main:
                  - path: /data
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
