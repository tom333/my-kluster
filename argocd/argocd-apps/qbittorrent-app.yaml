apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qbittorrent
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: selfhost
    server: https://kubernetes.default.svc
  project: selfhost-project
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 4.6.2
    helm:
      values: |
        controllers:
          main:
            containers:
              main:
                image:
                  repository: lscr.io/linuxserver/qbittorrent
                  tag: latest
                env:
                  TZ: "Europe/Paris"
                  PUID: "1000"
                  PGID: "1000"
                  WEBUI_PORT: "8080"
        service:
          main:
            controller: main
            ports:
              http:
                port: 8080
        ingress:
          main:
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
              nginx.ingress.kubernetes.io/auth-url: "https://auth.tgu.ovh/oauth2/auth"
              nginx.ingress.kubernetes.io/auth-signin: "https://auth.tgu.ovh/oauth2/start?rd=https://qbittorrent.tgu.ovh"
            hosts:
              - host: qbittorrent.tgu.ovh
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: main
                      port: http
            tls:
              - secretName: qbittorrent-tls
                hosts:
                  - qbittorrent.tgu.ovh
        persistence:
          config:
            type: persistentVolumeClaim
            accessMode: ReadWriteOnce
            size: 1Gi
            globalMounts:
              - path: /config
          torrents:
            # Stockage local sur le nœud MicroK8s
            # Partage le même path que Radarr/Sonarr pour accéder aux fichiers téléchargés
            type: hostPath
            hostPath: /opt/media-stack/torrents
            hostPathType: DirectoryOrCreate
            globalMounts:
              - path: /data
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
    automated:
      selfHeal: true
      prune: true
