apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # OFFICIAL Hermes stack on nousresearch/hermes-agent + its built-in web dashboard.
  #
  # 2026-06: migrated OFF the third-party ekkoye8888/hermes-web-ui (EKKOLearnAI)
  # image onto the upstream NousResearch image. Rationale:
  #   - the agent now ships its OWN full admin web dashboard (port 9119, the
  #     "Surface Release" v2026.6.5+): config form (150+ fields), MCP catalog
  #     w/ toggles, cron-job manager, channels/pairing, credentials, webhooks,
  #     memory, sessions, analytics, gateway controls. This is exactly the admin
  #     surface we used EKKO for — but first-party, so the bus-factor-1 risk of
  #     the third-party UI disappears.
  #   - chat stays on TELEGRAM (no chat UI needed); the dashboard is admin-only.
  #
  # TOPOLOGY: still ONE container. The official image runs the gateway via the
  # `gateway run` command (Telegram bot + cron), and the dashboard is a separate
  # s6-supervised service inside the SAME container, enabled by HERMES_DASHBOARD=1
  # (no second command, no second pod — the coupling that made past split-deploy
  # attempts fail does not exist: gateway + dashboard ship in one image).
  #
  # STATE / PVC: release name kept "hermes-agent" so the bjw-s PVC stays
  # "hermes-agent-data" → the EXISTING HERMES_HOME PVC (config.yaml, sessions,
  # skills, memory, state.db) is reused IN PLACE. HERMES_HOME overridden to
  # /opt/data to match the existing layout.
  #
  # OWNERSHIP: the official v2026.6 image runs gateway + dashboard as uid 10000
  # (verified via /proc), unlike EKKO which ran as root and the older nous image
  # which used 10010. The PVC holds a MIX of nous-era 10010 files and EKKO-era
  # root files; a `fix-ownership` initContainer chowns everything to 10000:10000
  # each boot so the agent (10000) can write gateway-locks/kanban.db/sessions
  # regardless of who wrote them last. Idempotent, cheap (metadata only).
  # microk8s-hostpath ignores fsGroup (known quirk), hence the explicit chown.
  #
  # MIGRATION SAFETY (v0.6.x EKKO → v2026.6.x official): the official agent will
  # read/migrate $HERMES_HOME/config.yaml on first boot. We RE-SEED config.yaml
  # from the ConfigMap every boot (Git = source of truth), so the migration runs
  # against OUR declared config, deterministically. ROLLBACK is git revert of
  # this file + restore of the PVC backup taken before the first official boot
  # (the schema migration is the one irreversible step — back up /opt/data first).
  #
  # UI-MANAGED vs GIT-MANAGED: because bootstrap clobbers config.yaml every boot,
  # dashboard edits to config/MCP/providers are EPHEMERAL — declare those HERE in
  # Git. What the dashboard persistently manages: CRON JOBS (jobs.json on the PVC,
  # NOT clobbered), pairing/credentials, sessions, analytics. If you'd rather make
  # the dashboard the source of truth for config too, remove the `bootstrap`
  # initContainer + ConfigMap mount (you then lose declarative config).
  name: hermes-agent
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: hermes
    server: https://kubernetes.default.svc
  project: infra-project
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      values: |
        controllers:
          hermes:
            type: deployment
            strategy: Recreate                      # state in PVC, single writer; RWO hostpath needs old pod gone before new mounts
            pod:
              # Force Telegram over IPv4. The pod resolves api.telegram.org to BOTH
              # an A record (149.154.166.110) and an AAAA, but the cluster has NO
              # IPv6 egress — so the bot's IPv6-first attempt times out (~10-20s) →
              # flaky/failed cron delivery. Pinning to Telegram's stable IPv4 (its
              # own hardcoded fallback IP) removes the AAAA path entirely.
              hostAliases:
                - ip: "149.154.166.110"
                  hostnames:
                    - "api.telegram.org"
            initContainers:
              # Sync config.yaml into HERMES_HOME from the ConfigMap on EVERY boot.
              # Git (this chart's values) is the SOURCE OF TRUTH. The official agent
              # reads $HERMES_HOME/config.yaml (model/providers/mcp_servers/toolsets/
              # web/compression). Live UI/PVC edits are clobbered on restart — declare
              # config HERE, not live (see header note on UI- vs Git-managed config).
              bootstrap:
                image:
                  repository: busybox
                  tag: "1.36"
                command: ["sh", "-c"]
                args:
                  - |
                    set -e
                    echo "Syncing config.yaml from ConfigMap (Git source of truth)"
                    cp -f /bootstrap/config.yaml /opt/data/config.yaml
              # Install static CLI extras (jq, yq) into the PVC so the agent's
              # terminal tool can pipe HTTP/JSON workflows without an image rebuild.
              # /opt/data/.local/bin is on $PATH. Binaries are world +x so the agent
              # (uid 10010) executes them regardless of ownership. Idempotent.
              install-cli-extras:
                image:
                  repository: alpine
                  tag: "3.20"
                command: ["sh", "-c"]
                args:
                  - |
                    set -e
                    apk add --no-cache curl >/dev/null
                    mkdir -p /opt/data/.local/bin
                    cd /opt/data/.local/bin

                    if [ ! -x jq ]; then
                      echo "Downloading jq (static, ~5 MB)"
                      curl -fsSL -o jq https://github.com/jqlang/jq/releases/latest/download/jq-linux-amd64
                      chmod +x jq
                    else
                      echo "jq already installed, skip"
                    fi

                    if [ ! -x yq ]; then
                      echo "Downloading yq (static, ~10 MB)"
                      curl -fsSL -o yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
                      chmod +x yq
                    else
                      echo "yq already installed, skip"
                    fi

                    echo "Installed CLI extras:"
                    ls -la /opt/data/.local/bin/
              # Install firecrawl-py into the PVC (consumed via PYTHONPATH on main).
              # The official image registers the web-firecrawl PLUGIN but does NOT
              # bundle the firecrawl-py client package, and lazy-install is blocked
              # (security.allow_lazy_installs=false) → web_search/web_extract fail →
              # the agent falls back to the OOM-flaky browser (lightpanda) → burns
              # max_turns(90) → cron scheduler treats max-iterations as a failure
              # (RuntimeError) → NO Telegram delivery. The venv lives on the ephemeral
              # image layer (not the PVC), so a cross-container venv install is
              # impossible; we install to a PVC dir on PYTHONPATH instead. Idempotent.
              # NB: the python3.13 path is pinned — bump if the base image's python
              # minor version changes. Shared deps (websockets/aiohttp) shadow the
              # venv by minor versions only; Hermes core imports verified OK.
              install-py-extras:
                image:
                  repository: nousresearch/hermes-agent
                  tag: "v2026.7.20"
                  pullPolicy: IfNotPresent
                command: ["sh", "-c"]
                args:
                  - |
                    set -e
                    TGT=/opt/data/.local/lib/python3.13/site-packages
                    if [ -d "$TGT/firecrawl" ]; then
                      echo "firecrawl-py already present in $TGT, skip"
                    else
                      echo "Installing firecrawl-py==4.17.0 -> $TGT"
                      /usr/local/bin/uv pip install --target "$TGT" --python /opt/hermes/.venv/bin/python3 "firecrawl-py==4.17.0"
                    fi
                    chown -R 10000:10000 "$TGT"
                securityContext:
                  runAsUser: 0
                  runAsGroup: 0
              # Normalize PVC ownership to 10000:10000 — the uid the official
              # v2026.6 agent runs `gateway run` AND `hermes dashboard` as (verified
              # via /proc; it chowns HERMES_HOME root to 10000:10000 0700 at boot but
              # NOT recursively). The PVC mixes nous-era 10010 files and EKKO-era root
              # files; without this the agent (10000) is "other" on gateway-locks/,
              # kanban.db, telegram lock → EACCES → Telegram/kanban fail to start.
              # NB: the OLD nous image used uid 10010; this official image uses 10000.
              # Runs as root, chowns both volumes. Cheap metadata op, idempotent.
              fix-ownership:
                image:
                  repository: busybox
                  tag: "1.36"
                command: ["sh", "-c"]
                args:
                  - |
                    set -e
                    echo "Normalizing /opt/data + /workspace ownership to 10000:10000"
                    chown -R 10000:10000 /opt/data /workspace
                securityContext:
                  runAsUser: 0
                  runAsGroup: 0
            containers:
              # SINGLE container — official agent: gateway (Telegram + cron) via the
              # `gateway run` command + dashboard (s6 service) via HERMES_DASHBOARD=1.
              main:
                image:
                  repository: nousresearch/hermes-agent
                  # Date-scheme tags. v2026.7.20 = latest stable, post "Surface
                  # Release" (v2026.6.5) which shipped the full admin dashboard.
                  # Renovate can track docker tags for this image.
                  tag: "v2026.7.20"
                  pullPolicy: IfNotPresent
                # Keep the image's s6 entrypoint; pass `gateway run` as args so the
                # gateway runs AND s6 supervises the dashboard (HERMES_DASHBOARD=1).
                # --replace clears a stale gateway.lock/pid left on the PVC by the
                # previous (EKKO) gateway, otherwise `gateway run` can refuse to start
                # ("gateway already running"). fix-ownership chowns the lock to 10010
                # first so --replace can remove it.
                args: ["gateway", "run", "--replace"]
                env:
                  # --- Hermes data home: reuse the EXISTING PVC layout ---
                  HERMES_HOME: "/opt/data"
                  # firecrawl-py (+ other pip extras) installed on the PVC by the
                  # install-py-extras initContainer — restores web_search/web_extract.
                  PYTHONPATH: "/opt/data/.local/lib/python3.13/site-packages"
                  # --- Built-in web dashboard (admin panel, port 9119) ---
                  HERMES_DASHBOARD: "1"
                  # --- API server: REQUIRED for the dashboard to function (it talks
                  #     to the gateway's REST API); also the OpenAI-compatible endpoint
                  #     on 8642. Key from hermes-secrets (envFrom). ---
                  API_SERVER_ENABLED: "true"
                  API_SERVER_HOST: "0.0.0.0"
                  # --- Dashboard auth gate: bind 0.0.0.0 → fail-closed, the dashboard
                  #     REFUSES to start without auth configured. Basic-auth creds from
                  #     the hermes-dashboard-auth SealedSecret (defense-in-depth on top
                  #     of the LAN-only ingress middleware). ---
                  HERMES_DASHBOARD_BASIC_AUTH_USERNAME:
                    valueFrom:
                      secretKeyRef:
                        name: hermes-dashboard-auth
                        key: username
                  HERMES_DASHBOARD_BASIC_AUTH_PASSWORD:
                    valueFrom:
                      secretKeyRef:
                        name: hermes-dashboard-auth
                        key: password
                  HERMES_DASHBOARD_BASIC_AUTH_SECRET:
                    valueFrom:
                      secretKeyRef:
                        name: hermes-dashboard-auth
                        key: session-secret
                  # --- Telegram access control. VERIFY post-deploy that allowed-users
                  #     carries over; pairing state lives on the PVC so it should. If
                  #     not, set it from the dashboard Channels/Pairing tab. ---
                  TELEGRAM_ALLOWED_USERS: "843341688"
                  TELEGRAM_HOME_CHANNEL: "843341688"
                  GATEWAY_ALLOW_ALL_USERS: "false"
                  WHATSAPP_ENABLED: "false"
                  # --- Web integrations (in-cluster, no keys) ---
                  SEARXNG_URL: "http://searxng.searxng.svc.cluster.local:8080"
                  # NB: pas de OPENAI_BASE_URL ici. La var GÉNÉRIQUE détournait les clients
                  # auxiliaires (web_extract/session_search/compression) vers LocalAI alors que
                  # le provider agent est openrouter (warning agent.auxiliary_client). Le provider
                  # nommé `localai` ci-dessous porte son propre base_url → reste joignable sans la var.
                  # CRW (fastCRW) — Firecrawl-compatible scrape/search backend.
                  FIRECRAWL_API_URL: "http://crw.hermes.svc.cluster.local:3000"
                envFrom:
                  - secretRef:
                      name: hermes-secrets   # OPENAI_API_KEY + OPENROUTER_API_KEY + TELEGRAM_BOT_TOKEN + API_SERVER_KEY
                resources:
                  limits:   { cpu: "2",    memory: 3Gi }
                  requests: { cpu: "300m", memory: 768Mi }
        service:
          app:
            controller: hermes
            ports:
              http:
                # Web admin dashboard. (Gateway OpenAI API on 8642 stays intra-pod /
                # localhost for the dashboard; not exposed externally — chat is Telegram.)
                port: 9119
                targetPort: 9119
                protocol: TCP
        ingress:
          app:
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              # LAN-only (192.168.88.0/24 home + 10.1.0.0/16 k8s pod CIDR).
              # Traefik handles long WS/streams (dashboard live logs/chat) natively.
              traefik.ingress.kubernetes.io/router.middlewares: hermes-lan-only@kubernetescrd
            hosts:
              - host: hermes.tgu.ovh
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: app
                      port: http
            tls:
              - hosts:
                  - hermes.tgu.ovh
                secretName: hermes-tls
        persistence:
          # HERMES_HOME — the existing agent PVC (claim "hermes-agent-data"),
          # reused as-is so config.yaml/sessions/skills/memory/state.db survive the
          # migration off EKKO. Mounted on the init + main containers.
          data:
            type: persistentVolumeClaim
            storageClass: microk8s-hostpath
            accessMode: ReadWriteOnce
            size: 10Gi                              # NB: hostpath ignores the limit; keep 10Gi to avoid an immutable-field sync error on the existing PVC
            advancedMounts:
              hermes:
                bootstrap:
                  - path: /opt/data
                install-cli-extras:
                  - path: /opt/data
                install-py-extras:
                  - path: /opt/data
                fix-ownership:
                  - path: /opt/data
                main:
                  - path: /opt/data
          # Agent terminal cwd / file workspace (config.yaml terminal.cwd: /workspace).
          files:
            type: persistentVolumeClaim
            storageClass: microk8s-hostpath
            accessMode: ReadWriteOnce
            size: 5Gi
            advancedMounts:
              hermes:
                fix-ownership:
                  - path: /workspace
                main:
                  - path: /workspace
          bootstrap:
            type: configMap
            # bjw-s 5.0.1 merges all configMaps.* entries into a single CM
            # named after the release (here: hermes-agent), not <release>-<key>.
            name: hermes-agent
            advancedMounts:
              hermes:
                bootstrap:
                  - path: /bootstrap
                    readOnly: true
        configMaps:
          bootstrap:
            data:
              config.yaml: |
                # Hermes Agent config — SOURCE OF TRUTH (declarative).
                # The bootstrap initContainer overwrites $HERMES_HOME/config.yaml from
                # this block on EVERY boot. Edit HERE (Git) only — live edits via
                # kubectl/UI to the PVC copy are clobbered on the next restart.
                model:
                  # 2026-06-10: agent moved to a PAID, reliable OpenRouter model.
                  #
                  # Why (full history below): local inference is a dead end on the RTX
                  # 3060 12GB — Qwen3-8B NARRATES instead of tool-calling under Hermes'
                  # ~19k system prompt + 31 tool schemas; reliable agentic tool-calling
                  # needs 14-32B+, which won't fit/run fast on 12GB. The OpenRouter
                  # ":free" tier then caused a 503/429/timeout STORM (no SLA,
                  # deprioritized): observed 90×503 + 49×429, agent loops aborting at
                  # max_turns → "doesn't meet expectations / loses results".
                  #
                  # Gemini 2.5 Flash: ~$0.15/$0.60 per 1M, reliable tool-calling, huge
                  # context, strong multilingual (FR). For a personal assistant (a few
                  # dozen runs/day) this is cents/month but STABLE — the whole point.
                  # Cheaper alt: deepseek/deepseek-chat ($0.14/$0.28). Both draw from
                  # the OpenRouter credit balance (BYOK).
                  #
                  # Local-inference history (kept for context):
                  # - Qwen2.5-7B/Hermes-3-8B: tool_calls on tiny prompts, hallucinate under load.
                  # - qwen3.6-35b-a3b (MoE): experts offloaded to CPU on 12GB → prefill
                  #   CPU-bound → 744s/turn → APITimeout. Fine for direct chat only.
                  # - Qwen3-8B: full-GPU but narrates under load (8B ceiling).
                  # LocalAI/qwen3-8b stays defined below for direct chat / embeddings.
                  default: deepseek/deepseek-v4-flash
                  provider: openrouter
                  # Declared window for compression math; well above Hermes' 64k floor.
                  # DeepSeek V4 Flash: 284B MoE (13B active), 1M ctx, agentic index 62.3
                  # (#1 Hermes app on OpenRouter by token volume, 10x cheaper than Gemini 2.5 Flash)
                  context_length: 131072
                # Named providers: Hermes resolves api_key from the env var named in key_env.
                # OPENROUTER_API_KEY + OPENAI_API_KEY come from the hermes-secrets SealedSecret.
                providers:
                  openrouter:
                    name: openrouter
                    base_url: https://openrouter.ai/api/v1
                    key_env: OPENROUTER_API_KEY
                    default_model: deepseek/deepseek-v4-flash
                    # Cap per-request time so a slow upstream fails fast (OpenRouter
                    # retries another route) instead of hanging the whole turn.
                    request_timeout_seconds: 120
                  # Free fallback for light/non-structured tasks. WARNING: 50% structured output
                  # error rate → do NOT use as agent default; only for simple crons that don't
                  # call tools heavily. Prompts are logged by provider.
                  owl:
                    name: openrouter
                    base_url: https://openrouter.ai/api/v1
                    key_env: OPENROUTER_API_KEY
                    default_model: openrouter/owl-alpha
                    request_timeout_seconds: 120
                  # Kept for direct chat / embeddings / fallback (NOT the agent default).
                  localai:
                    name: localai
                    base_url: http://localai.localai.svc.cluster.local:8080/v1
                    key_env: OPENAI_API_KEY
                    default_model: qwen3-8b
                # Chaîne de repli quand le modèle primaire échoue APRÈS ses retries
                # (ex: OpenRouter renvoie un SSE vide/malformé sur deepseek-v4-flash,
                # ~1×/jour, flakiness streaming upstream). gemini-2.5-flash = fiable,
                # ne se déclenche que sur l'événement rare → coût négligeable, erreur invisible.
                fallback_providers:
                  - provider: openrouter
                    model: google/gemini-2.5-flash
                mcp_servers:
                  # arrconf-mcp: in-cluster ClusterIP MCP (read-only, 10 tools) for the media stack.
                  # Bearer token = MCP_AUTH_TOKEN (also in arrconf-env sealed secret on the server side).
                  arrconf:
                    url: "http://arrconf-mcp.selfhost.svc.cluster.local:8080/mcp"
                    headers:
                      Authorization: "Bearer b05d23972ee9db5c20c75dafa328971e5fdcf9f846dd8c92c760e58b5f18f76c"
                    timeout: 60
                    connect_timeout: 10
                    enabled: true
                  # txtai — second-brain : recherche sémantique sur les transcripts Claude
                  # Code (index txtai in-cluster, script claude-session-indexer). Transport
                  # SSE (txtai monte /mcp en SSE, pas streamable-HTTP → transport: sse requis).
                  # Token via ${TXTAI_MCP_TOKEN} (hermes-secrets, envFrom) → PAS de clair en
                  # Git (contrairement au bearer arrconf ci-dessus, à migrer #1). On n'expose
                  # QUE le tool `search` (les add/delete/upsert/index = bloat prompt + risque
                  # que l'agent modifie/supprime l'index).
                  txtai:
                    url: "http://txtai.txtai.svc.cluster.local:8000/mcp"
                    transport: sse
                    headers:
                      Authorization: "Bearer ${TXTAI_MCP_TOKEN}"
                    tools:
                      include: ["search_search_get"]
                    timeout: 60
                    connect_timeout: 10
                    enabled: true
                agent:
                  max_turns: 90
                  gateway_timeout: 1800
                  restart_drain_timeout: 60
                  tool_use_enforcement: auto
                terminal:
                  backend: local
                  # Shared file-browser root (persistence.files = /workspace).
                  # Agent tool output here is visible live in the UI "Files" tab.
                  cwd: /workspace
                  timeout: 180
                display:
                  tool_progress: all
                  interim_assistant_messages: true
                browser:
                  inactivity_timeout: 120
                  command_timeout: 30
                  allow_private_urls: false
                  # Remote headless browser over CDP (lightpanda-app.yaml) — the
                  # image has no usable local Chromium. Hermes GETs /json/version on
                  # this URL, reads webSocketDebuggerUrl (lightpanda advertises the
                  # Service host, not 0.0.0.0), connects. Tokenless (ClusterIP only).
                  cdp_url: http://lightpanda.hermes.svc.cluster.local:9222
                # Search + extract both routed through CRW / fastCRW — a self-hosted,
                # Firecrawl-compatible API (crw-app.yaml). CRW runs search via our
                # SearXNG and renders JS pages via our lightpanda, returning clean
                # markdown for web_extract. FIRECRAWL_API_URL (container env) points
                # the firecrawl backend at CRW.
                web:
                  search_backend: firecrawl
                  backend: firecrawl
                  extract_backend: firecrawl
                compression:
                  enabled: true
                  # Large-context model → compress LATE so tool results aren't
                  # summarized away mid-task. 0.6 * 131072 ≈ 79k before compaction.
                  threshold: 0.6
                  target_ratio: 0.35
                  protect_last_n: 10
                  protect_first_n: 1
                # Restrict Telegram toolset: drop tts/image_gen/vision/messaging to
                # shrink the tool-schema portion of the system prompt (~2-3k tokens).
                # Keep web, browser, file, todo, cronjob, skills, terminal, code_execution.
                # Security: TELEGRAM_ALLOWED_USERS pins the bot to user 843341688 only;
                # container is non-privileged, no host mount, no sudo — terminal access
                # cannot escape the container.
                platform_toolsets:
                  telegram: [web, browser, file, todo, cronjob, skills, terminal, code_execution]
                # Disable Nous Portal as auxiliary fallback — no subscription, every
                # call returns 402 and floods logs.
                fallback:
                  exclude: ["nous", "nous-api"]
                security:
                  redact_secrets: true
                  tirith_enabled: true
                  tirith_fail_open: true
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
