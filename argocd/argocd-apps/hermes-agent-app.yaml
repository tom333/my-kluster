apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # ALL-IN-ONE Hermes stack on the EKKOLearnAI/hermes-web-ui image.
  #
  # 2026-06: migrated from the previous two-container sidecar (nousresearch/
  # hermes-agent + outsourc-e/hermes-workspace) to a SINGLE container running
  # ekkoye8888/hermes-web-ui. That image is `FROM nousresearch/hermes-agent`
  # plus Node + the web admin UI, so ONE container now provides:
  #   agent runtime + gateway + Telegram bot + cron + web admin UI (port 6060).
  # Chat is driven in-process via the image's Python agent-bridge; the UI also
  # manages the gateway lifecycle itself (no s6 supervision in this image —
  # the entrypoint is `node dist/server/index.js`, which spawns
  # `hermes gateway run --replace`).
  #
  # Why single-container: EKKOLearn is architected to BE the agent host (it
  # spawns the agent in-process), so a separate agent container would mean two
  # AIAgent processes on one state.db. The all-in-one is the upstream-intended
  # topology and collapses the stack to one image.
  #
  # Runtime user: this image runs as ROOT (its Dockerfile sets USER root and
  # overrides the base entrypoint, so the base image's HERMES_UID step-down is
  # bypassed). Root reads/writes the existing PVC (data created by the old
  # nousresearch image as uid 10010) without trouble. HERMES_ALLOW_ROOT_GATEWAY
  # =1 lets the gateway start as root.
  #
  # Name kept as "hermes-agent": the bjw-s PVC is <release>-<key> =
  # "hermes-agent-data", so reusing this release name PRESERVES the existing
  # HERMES_HOME PVC (config.yaml, sessions, skills, memory, state.db) across the
  # migration. EKKOLearn reads $HERMES_HOME/config.yaml exactly like upstream;
  # existing sessions appear (read-only) in the History tab.
  name: hermes-agent
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: hermes
    server: https://kubernetes.default.svc
  project: infra-project
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      values: |
        controllers:
          hermes:
            type: deployment
            strategy: Recreate                      # state in PVC, single writer
            pod:
              securityContext:
                # EKKOLearn runs as ROOT (entrypoint bypasses the base image's
                # HERMES_UID step-down). The existing PVC is owned 10010:10000
                # from the old nousresearch agent; root accesses it regardless,
                # and microk8s-hostpath ignores fsGroup anyway (known quirk), so
                # no fsGroup/uid juggling is needed here. New files land root-
                # owned, which is consistent since the agent+gateway also run
                # as root in this image.
                {}
            initContainers:
              # Sync config.yaml into HERMES_HOME from the ConfigMap on EVERY boot.
              # Git (this chart's values) is the SOURCE OF TRUTH. The bundled agent
              # reads $HERMES_HOME/config.yaml exactly like upstream hermes-agent
              # (model/providers/telegram toolsets/compression/web). Live UI edits to
              # the PVC copy are intentionally clobbered on restart; declare MCP
              # servers, providers, skills config etc. HERE, not live.
              # NOTE: EKKOLearn strips any legacy `platforms.api_server` block from
              # config.yaml on startup — we don't ship one, so this is a no-op.
              bootstrap:
                image:
                  repository: busybox
                  tag: "1.36"
                command: ["sh", "-c"]
                args:
                  - |
                    set -e
                    echo "Syncing config.yaml from ConfigMap (Git source of truth)"
                    cp -f /bootstrap/config.yaml /opt/data/config.yaml
              # Install static CLI extras (jq, yq) into the PVC so the agent's
              # terminal tool can pipe HTTP/JSON workflows without an image rebuild.
              # /opt/data/.local/bin is on the base image's $PATH. The agent+gateway
              # run as root in this image, so no chown is required (root owns what it
              # downloads and reads everything). Image alpine/curl has HTTPS.
              # Idempotent: skips download if binary already present + executable.
              install-cli-extras:
                image:
                  repository: alpine
                  tag: "3.20"
                command: ["sh", "-c"]
                args:
                  - |
                    set -e
                    apk add --no-cache curl >/dev/null
                    mkdir -p /opt/data/.local/bin
                    cd /opt/data/.local/bin

                    if [ ! -x jq ]; then
                      echo "Downloading jq (static, ~5 MB)"
                      curl -fsSL -o jq https://github.com/jqlang/jq/releases/latest/download/jq-linux-amd64
                      chmod +x jq
                    else
                      echo "jq already installed, skip"
                    fi

                    if [ ! -x yq ]; then
                      echo "Downloading yq (static, ~10 MB)"
                      curl -fsSL -o yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
                      chmod +x yq
                    else
                      echo "yq already installed, skip"
                    fi

                    echo "Installed CLI extras:"
                    ls -la /opt/data/.local/bin/
            containers:
              # SINGLE container — agent + gateway + Telegram + cron + web admin UI.
              main:
                image:
                  repository: ekkoye8888/hermes-web-ui
                  # Pin a semver tag (NOT latest). amd64 multi-arch confirmed.
                  # Renovate can track docker tags for this image.
                  tag: "v0.6.10"
                  pullPolicy: IfNotPresent
                env:
                  # --- Web UI server ---
                  PORT: "6060"                          # UI listen port (Docker default)
                  BIND_HOST: "0.0.0.0"
                  CORS_ORIGINS: "https://hermes.tgu.ovh" # not "*"; matches the ingress host
                  # --- Hermes data home: reuse the EXISTING PVC layout ---
                  # Override the image default (/home/agent/.hermes) to /opt/data so the
                  # bundled agent reads the same config.yaml/sessions/skills/state.db the
                  # old nousresearch agent wrote. Both the web-ui and the spawned gateway
                  # honor HERMES_HOME.
                  HERMES_HOME: "/opt/data"
                  # The web UI's OWN state (its SQLite DBs, auth .token, logs, uploads).
                  # Kept on the same PVC, in a distinct subdir. The auto-generated auth
                  # token persists here across restarts (so logins/links stay stable).
                  HERMES_WEB_UI_HOME: "/opt/data/hermes-web-ui"
                  # File-browser root (own PVC, shared with the agent terminal cwd).
                  WORKSPACE_BASE: "/workspace"
                  # --- Gateway / Telegram / cron lifecycle ---
                  # Managed-gateway mode: the UI starts `hermes gateway run` itself.
                  # This is what runs the Telegram bot + cron. Do NOT set
                  # HERMES_WEB_UI_DISABLE_GATEWAY_AUTOSTART (that would kill them).
                  HERMES_WEB_UI_MANAGED_GATEWAY: "1"
                  # Gateway refuses to start as root unless this is set; image is root.
                  HERMES_ALLOW_ROOT_GATEWAY: "1"
                  # Don't overwrite our seeded/custom skills with EKKOLearn's bundled
                  # skill set on startup. Drop this if you WANT its bundled skills.
                  HERMES_WEB_UI_DISABLE_SKILL_INJECTION: "1"
                  # --- Agent config (best-effort container env) ---
                  # NOTE: EKKOLearn passes the spawned gateway a FILTERED env (allowlist),
                  # so these are not guaranteed to reach the agent process. The robust
                  # path is $HERMES_HOME/.env + config.yaml — the reused PVC's existing
                  # /opt/data/.env should already carry the agent secrets. VERIFY after
                  # deploy that Telegram connects and inference works; if not, seed
                  # /opt/data/.env via an initContainer.
                  TELEGRAM_ALLOWED_USERS: "843341688"
                  TELEGRAM_HOME_CHANNEL: "843341688"
                  GATEWAY_ALLOW_ALL_USERS: "false"
                  WHATSAPP_ENABLED: "false"
                  SEARXNG_URL: "http://searxng.searxng.svc.cluster.local:8080"
                  OPENAI_BASE_URL: "http://localai.localai.svc.cluster.local:8080/v1"
                envFrom:
                  - secretRef:
                      name: hermes-secrets   # OPENAI_API_KEY + TELEGRAM_BOT_TOKEN + API_SERVER_KEY
                resources:
                  limits:   { cpu: "2",    memory: 3Gi }
                  requests: { cpu: "300m", memory: 768Mi }
        service:
          app:
            controller: hermes
            ports:
              http:
                port: 6060
                targetPort: 6060
                protocol: TCP
        ingress:
          app:
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              # LAN-only (192.168.88.0/24 home + 10.1.0.0/16 k8s pod CIDR).
              nginx.ingress.kubernetes.io/whitelist-source-range: "192.168.88.0/24,10.1.0.0/16"
              # WebSocket + long-lived streams: Socket.IO chat (/socket.io/), the web
              # terminal (/api/hermes/terminal) and kanban events. NGINX auto-upgrades
              # WS; bump read/send timeouts so chat runs + compression (up to minutes)
              # don't get cut at the 60s default.
              nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
              nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
              # Uploads/downloads (avatars, files) — server allows up to ~200MB.
              nginx.ingress.kubernetes.io/proxy-body-size: "200m"
            hosts:
              - host: hermes.tgu.ovh
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: app
                      port: http
            tls:
              - hosts:
                  - hermes.tgu.ovh
                secretName: hermes-tls
        persistence:
          # HERMES_HOME — the existing agent PVC (claim "hermes-agent-data"),
          # reused as-is so config.yaml/sessions/skills/memory/state.db survive the
          # migration. Also holds the web UI's own state under /opt/data/hermes-web-ui.
          data:
            type: persistentVolumeClaim
            storageClass: microk8s-hostpath
            accessMode: ReadWriteOnce
            size: 10Gi                              # NB: hostpath ignores the limit; keep 10Gi to avoid an immutable-field sync error on the existing PVC
            advancedMounts:
              hermes:
                bootstrap:
                  - path: /opt/data
                install-cli-extras:
                  - path: /opt/data
                main:
                  - path: /opt/data
          # File-browser root (WORKSPACE_BASE), separate PVC.
          files:
            type: persistentVolumeClaim
            storageClass: microk8s-hostpath
            accessMode: ReadWriteOnce
            size: 5Gi
            advancedMounts:
              hermes:
                main:
                  - path: /workspace
          bootstrap:
            type: configMap
            # bjw-s 5.0.1 merges all configMaps.* entries into a single CM
            # named after the release (here: hermes-agent), not <release>-<key>.
            name: hermes-agent
            # Mount only on the bootstrap initContainer of the hermes controller.
            advancedMounts:
              hermes:
                bootstrap:
                  - path: /bootstrap
                    readOnly: true
        configMaps:
          bootstrap:
            data:
              config.yaml: |
                # Hermes Agent config — SOURCE OF TRUTH (declarative).
                # The bootstrap initContainer overwrites $HERMES_HOME/config.yaml from
                # this block on EVERY boot. Edit HERE (Git) only — live edits via
                # kubectl/UI to the PVC copy are clobbered on the next restart.
                model:
                  # 2026-06-02: switched Qwen2.5-7B → Hermes-3-Llama-3.1-8B → Qwen3-8B.
                  # 2026-06-06: tried qwen3.6-35b-a3b → REVERTED to qwen3-8b for the agent.
                  #
                  # - Qwen 2.5 7B (Q4) emits tool_calls JSON on small isolated prompts
                  #   but hallucinates free text under Hermes' 16k+ system prompt.
                  # - Hermes-3-Llama-3.1-8B (Nous Research) FAILED tool calling even on
                  #   the small isolated test — likely a LocalAI tool-parser mismatch
                  #   with Hermes-3's XML grammar under automatic_tool_parsing_fallback.
                  # - qwen3.6-35b-a3b (MoE) is FAST in direct chat but UNUSABLE for the
                  #   agent here: its experts are offloaded to CPU RAM (override_tensor
                  #   ffn_exps=CPU, RTX 3060 12GB can't hold them), so PREFILL of Hermes'
                  #   large prompts (system prompt + tool schemas + history, 5-16k tokens)
                  #   is CPU-bound and blows past the OpenAI client timeout → APITimeout
                  #   after 3 retries (observed: 744s for one turn). Tiny direct-chat
                  #   prompts prefill instantly, which is why manual chat felt fast. Keep
                  #   it defined in LocalAI for direct chat, but NOT as the agent model.
                  # - Qwen3-8B runs full-GPU but NARRATES instead of calling tools under
                  #   Hermes' heavy load (19k system prompt + 31 tool schemas + multi-step):
                  #   an 8B capacity ceiling — confirmed NOT a LocalAI/format issue (it emits
                  #   correct structured tool_calls on simple prompts; the test proved it).
                  #   Reliable agentic tool-calling needs ~14-32B+, which won't fit/run fast
                  #   on the RTX 3060 12GB. Backend swap (vLLM/Ollama) doesn't help: same wall,
                  #   and vLLM can't run the MoE offload.
                  # 2026-06-06: agent moved OFF local inference to OpenRouter FREE models.
                  #   z-ai/glm-4.5-air:free (~100B MoE, agent-built, 131k ctx) is large enough
                  #   to DECIDE+CALL tools under load. $0/token. Requires: prompt-training ON in
                  #   OpenRouter privacy settings (else 404 data-policy) + a one-time $10 unlock
                  #   already done (1000 req/day vs 50). LocalAI/qwen3-8b stays defined below for
                  #   direct chat / embeddings / fallback — just not the agent default anymore.
                  default: z-ai/glm-4.5-air:free
                  provider: openrouter
                  # GLM-4.5-Air real context = 131k, well above Hermes' 64k hard floor.
                  context_length: 131072
                # Named providers: Hermes resolves api_key from the env var named in key_env.
                # OPENROUTER_API_KEY + OPENAI_API_KEY both come from the hermes-secrets
                # SealedSecret (envFrom). :free IDs rotate/deprecate — if glm-4.5-air:free
                # 404s, swap default to openai/gpt-oss-120b:free or qwen/qwen3-next-80b-a3b-instruct:free.
                providers:
                  openrouter:
                    name: openrouter
                    base_url: https://openrouter.ai/api/v1
                    key_env: OPENROUTER_API_KEY
                    default_model: z-ai/glm-4.5-air:free
                  # Kept for direct chat / embeddings / fallback (NOT the agent default).
                  localai:
                    name: localai
                    base_url: http://localai.localai.svc.cluster.local:8080/v1
                    key_env: OPENAI_API_KEY
                    default_model: qwen3-8b
                agent:
                  max_turns: 90
                  gateway_timeout: 1800
                  restart_drain_timeout: 60
                  tool_use_enforcement: auto
                terminal:
                  backend: local
                  # Shared file-browser root (persistence.files = WORKSPACE_BASE).
                  # Agent tool output here is visible live in the UI "Files" tab.
                  cwd: /workspace
                  timeout: 180
                display:
                  tool_progress: all
                  interim_assistant_messages: true
                browser:
                  inactivity_timeout: 120
                  command_timeout: 30
                  allow_private_urls: false
                # Route the web_search tool through self-hosted SearXNG.
                # SEARXNG_URL env (set in deployment spec) tells the plugin where to
                # POST. `search_backend` is the explicit per-capability picker;
                # `backend` is the shared fallback (both set for clarity).
                web:
                  search_backend: searxng
                  backend: searxng
                compression:
                  enabled: true
                  # Threshold MUST be tuned to LocalAI's real ceiling (32k for Qwen 2.5 7B),
                  # NOT to the declared context_length (65536). At 0.5 * 65536 = 32k,
                  # compression triggers exactly at the LocalAI overflow point, too late.
                  # 0.35 * 65536 = ~22.9k → compression starts well below the 32k ceiling,
                  # leaving ~9k of headroom for the new user turn + tool calls.
                  threshold: 0.35
                  # Tighter target_ratio: after compaction, transcript settles at
                  # 0.15 * 65536 = ~9.8k tokens (was ~13k), giving more room for the
                  # ~16k baseline system prompt + skills index.
                  target_ratio: 0.15
                  protect_last_n: 10
                  protect_first_n: 1
                # Restrict Telegram toolset: drop tts/image_gen/vision/messaging to
                # shrink the tool-schema portion of the system prompt (~2-3k tokens saved).
                # Keep web (search), browser (page fetch), file, todo, cronjob, skills,
                # terminal (curl/jq/awk/sed shell pipelines), code_execution (Python
                # sandbox: requests/httpx/json/yaml).
                # Security: TELEGRAM_ALLOWED_USERS pins the bot to user 843341688 only;
                # k8s container is non-privileged, no host mount, no sudo — terminal
                # access cannot escape the container.
                platform_toolsets:
                  telegram: [web, browser, file, todo, cronjob, skills, terminal, code_execution]
                # Disable Nous Portal as auxiliary fallback — no subscription, every
                # call returns 402 and floods logs. Hermes already throttles it after
                # the first failure (60s); this just silences the noise.
                fallback:
                  exclude: ["nous", "nous-api"]
                security:
                  redact_secrets: true
                  tirith_enabled: true
                  tirith_fail_open: true
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
