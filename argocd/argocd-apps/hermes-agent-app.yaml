apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # Single merged Application: the Hermes Agent (backend) and the Hermes
  # Workspace UI now run as TWO containers in ONE Pod (sidecar pattern),
  # mirroring the upstream docker-compose.yml of hermes-workspace.
  #
  # Why merged (was: 2 separate Deployments talking over the cluster network):
  #   - The Workspace needs FILESYSTEM access to the agent's HERMES_HOME
  #     (skills, sessions, memory, scripts) to render/edit them. Separate
  #     Pods with separate PVCs meant the UI saw an empty home and failed to
  #     write /opt/data/.hermes/scripts. A shared PVC fixes this.
  #   - In one Pod the containers share localhost, so the Workspace reaches
  #     the gateway/dashboard over 127.0.0.1 (no Service, no off-loopback auth
  #     surface, no cross-namespace URL mistakes).
  #
  # Name kept as "hermes-agent" on purpose: the bjw-s PVC is named
  # <release>-<key> = "hermes-agent-data", so reusing this release name
  # preserves the EXISTING agent PVC (skills/sessions/memory) across the
  # migration. The old hermes-workspace Application is disabled separately.
  name: hermes-agent
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: hermes
    server: https://kubernetes.default.svc
  project: infra-project
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      values: |
        controllers:
          hermes:
            type: deployment
            strategy: Recreate                      # state in PVC, single writer
            pod:
              securityContext:
                # NOTE: fsGroup is INERT on microk8s-hostpath (the hostPath
                # provisioner does not apply fsGroup ownership/permissions —
                # verified: /opt/data stays 10010:10000 mode 700, not group
                # 10010). The shared volume actually works because BOTH images
                # run their process as uid 10010 (agent: HERMES_UID=10010;
                # workspace image user is also uid 10010), so /opt/data
                # (10010-owned) and /home/workspace/.hermes are accessible by
                # owner, not by group. fsGroup is kept as best-effort: harmless
                # here, and correct if storage ever moves to a CSI that honors
                # it. Paths created by the root init containers (e.g.
                # /opt/data/.local) must be chown'd to 10010 explicitly — see
                # the install-cli-extras init.
                fsGroup: 10010
            initContainers:
              # Sync config.yaml into HERMES_HOME from the ConfigMap on EVERY boot.
              # Git (this chart's values) is the SOURCE OF TRUTH — the previous
              # "copy only if absent" guard meant any config.yaml edit committed
              # after first boot was silently ignored on the live PVC (e.g. the
              # qwen3-8b -> qwen3.6-35b-a3b model switch never took effect until a
              # manual reseed). Always overwriting makes Git authoritative, in line
              # with the rest of this GitOps repo. Live edits (kubectl/UI) to the
              # PVC copy are intentionally clobbered on restart; declare MCP servers,
              # providers, skills config etc. HERE, not live.
              # The image's cont-init re-normalises ownership to HERMES_UID after the
              # root cp, so no chown is needed here.
              bootstrap:
                image:
                  repository: busybox
                  tag: "1.36"
                command: ["sh", "-c"]
                args:
                  - |
                    set -e
                    echo "Syncing config.yaml from ConfigMap (Git source of truth)"
                    cp -f /bootstrap/config.yaml /opt/data/config.yaml
              # Install static CLI extras (jq, yq) into the PVC so the agent's
              # terminal tool can pipe HTTP/JSON workflows without an image rebuild.
              # /opt/data/.local/bin is already on the image's $PATH (verified:
              # PATH=/opt/hermes/bin:/opt/hermes/.venv/bin:/opt/data/.local/bin:/usr/local/sbin:...).
              # Image alpine/curl has HTTPS; busybox does not.
              # Idempotent: skips download if binary already present + executable.
              install-cli-extras:
                image:
                  repository: alpine
                  tag: "3.20"
                command: ["sh", "-c"]
                args:
                  - |
                    set -e
                    apk add --no-cache curl >/dev/null
                    mkdir -p /opt/data/.local/bin
                    cd /opt/data/.local/bin

                    if [ ! -x jq ]; then
                      echo "Downloading jq (static, ~5 MB)"
                      curl -fsSL -o jq https://github.com/jqlang/jq/releases/latest/download/jq-linux-amd64
                      chmod +x jq
                    else
                      echo "jq already installed, skip"
                    fi

                    if [ ! -x yq ]; then
                      echo "Downloading yq (static, ~10 MB)"
                      curl -fsSL -o yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
                      chmod +x yq
                    else
                      echo "yq already installed, skip"
                    fi

                    # The agent runs non-root (HERMES_UID=10010, gid 10000) and
                    # writes runtime state under /opt/data/.local (e.g. Telegram's
                    # .local/state). This init runs as root, so /opt/data/.local is
                    # created root-owned; the image's own setup only chowns its
                    # seeded files, not our injected dir. Hand ownership to the
                    # agent UID/GID or the agent gets EACCES (Telegram: "Permission
                    # denied: '/opt/data/.local/state'").
                    chown -R 10010:10000 /opt/data/.local

                    echo "Installed CLI extras:"
                    ls -la /opt/data/.local/bin/
              # Force gateway_state.json's `gateway_state` field to "running"
              # before the main container's cont-init.d/02-reconcile-profiles
              # reads it. The reconciler (hermes_cli/container_boot.py) reads the
              # DEFAULT gateway's prior state from $HERMES_HOME/gateway_state.json
              # and auto-starts the supervised gateway-default s6 service ONLY when
              # that prior state is "running" (_AUTOSTART_STATES = {"running"}).
              #
              # Two cases break the gateway otherwise, both leaving :8642 dead and
              # the workspace UI stuck on "Unauthorized" / disconnected:
              #   1. Pod restart: Hermes writes "stopped" on SIGTERM (graceful
              #      shutdown) → reconciler keeps it down.
              #   2. COLD START (fresh PVC / never-started): the file is ABSENT →
              #      _read_prior_state() returns None → not in {"running"} → down.
              #      (The previous version of this init no-op'd on absent, which is
              #      exactly the chicken-and-egg that broke first boot.)
              #
              # So: if the file is missing, CREATE it as running; if present but
              # not running, flip it. The live gateway overwrites this file with
              # full state once it boots. chown to the agent UID/GID (10010:10000)
              # so the non-root agent can rewrite it; /opt/data itself is 10010-
              # owned mode 700 so it could replace it anyway, but be explicit.
              force-gateway-autostart:
                image:
                  repository: alpine
                  tag: "3.20"
                command: ["sh", "-c"]
                args:
                  - |
                    set -e
                    f=/opt/data/gateway_state.json
                    if [ ! -f "$f" ]; then
                      echo '{"gateway_state":"running"}' > "$f"
                      echo "Created $f with gateway_state=running (cold start)"
                    else
                      apk add --no-cache jq >/dev/null
                      current=$(jq -r '.gateway_state // "absent"' "$f")
                      if [ "$current" = "running" ]; then
                        echo "gateway_state already 'running'; no change"
                      else
                        jq '.gateway_state = "running"' "$f" > "$f.tmp" && mv -f "$f.tmp" "$f"
                        echo "Patched gateway_state: $current → running"
                      fi
                    fi
                    chown 10010:10000 "$f" 2>/dev/null || true
            containers:
              # CONTAINER 1 — the Hermes Agent (backend: gateway :8642 + dashboard :9119).
              main:
                image:
                  repository: nousresearch/hermes-agent
                  tag: "v2026.5.29.2"
                  pullPolicy: IfNotPresent
                # IMPORTANT: do NOT pass `["gateway", "run"]` as CMD here.
                # The image's reconcile-profiles cont-init dynamically registers
                # a supervised s6 service `gateway-default` that already runs
                # `hermes gateway run`. If the container's CMD ALSO runs gateway,
                # the two processes race for the gateway.lock file and the
                # supervised one enters a permanent crashloop ("Gateway already
                # running (PID N)"). Sleep infinity keeps the container alive;
                # s6 handles gateway + dashboard supervision.
                args:
                  - "sleep"
                  - "infinity"
                env:
                  # Pin the image's runtime user. Upstream compose sets the same
                  # value; it must match the Pod fsGroup above so the agent owns
                  # what it writes and the workspace sidecar can read/write it.
                  HERMES_UID: "10010"
                  # HERMES_HOME points to /opt/data (PVC), not /opt/hermes
                  # which holds image code + scripts (main-wrapper.sh etc).
                  HERMES_HOME: "/opt/data"
                  # Plain Telegram config (non-sensitive)
                  TELEGRAM_ALLOWED_USERS: "843341688"
                  TELEGRAM_HOME_CHANNEL: "843341688"
                  GATEWAY_ALLOW_ALL_USERS: "false"
                  WHATSAPP_ENABLED: "false"
                  # Dashboard web UI — enabled so the workspace sidecar can drive
                  # the admin REST API (sessions/skills/config/MCP). Bound to
                  # loopback only: the only consumer is the workspace container
                  # in this same Pod, reaching it over 127.0.0.1:9119. Nothing
                  # off-Pod can touch it (no Service). INSECURE=true skips the
                  # Nous OAuth gate, which is safe given loopback-only binding.
                  HERMES_DASHBOARD: "true"
                  HERMES_DASHBOARD_HOST: "127.0.0.1"
                  HERMES_DASHBOARD_PORT: "9119"
                  HERMES_DASHBOARD_INSECURE: "true"
                  # SearXNG self-hosted instance (see argocd-apps/searxng-app.yaml).
                  # Picked up by /opt/hermes/plugins/web/searxng/provider.py via
                  # `is_available()` → bool(os.getenv("SEARXNG_URL")). Combined with
                  # the `web.search_backend: searxng` directive in config.yaml below,
                  # this routes Hermes' web_search tool through SearXNG instead of
                  # the default Brave/Tavily/etc. (which need paid API keys).
                  SEARXNG_URL: "http://searxng.searxng.svc.cluster.local:8080"
                  # Legacy OpenAI-compatible env pair. Hermes' actual routing
                  # for our model goes through `providers.localai` (named
                  # provider with key_env: OPENAI_API_KEY) — that's the
                  # modern syntax and takes precedence. But the hermes-workspace
                  # admin UI probes these legacy env vars to render the
                  # "Custom Providers → Custom Base URL" status; without them
                  # set the panel shows "❌ Not configured" even though
                  # inference works fine. Setting the same target keeps the
                  # UI honest and gives Hermes a fallback if the named-provider
                  # lookup ever misses.
                  OPENAI_BASE_URL: "http://localai.localai.svc.cluster.local:8080/v1"
                  # Gateway HTTP API server (port 8642) — consumed by the
                  # workspace sidecar over 127.0.0.1 for chat/models/streaming/
                  # jobs APIs. Bound to loopback only (sidecar is the sole
                  # consumer). API_SERVER_KEY (sealed via hermes-secrets) still
                  # authenticates calls; the workspace passes the same value as
                  # HERMES_API_TOKEN.
                  API_SERVER_ENABLED: "true"
                  API_SERVER_HOST: "127.0.0.1"
                  API_SERVER_PORT: "8642"
                envFrom:
                  - secretRef:
                      name: hermes-secrets   # OPENAI_API_KEY + TELEGRAM_BOT_TOKEN + API_SERVER_KEY
                resources:
                  limits:   { cpu: "2",    memory: 2Gi }
                  requests: { cpu: "200m", memory: 512Mi }

              # CONTAINER 2 — the Hermes Workspace UI (sidecar, port 3000).
              # Mirrors the upstream docker-compose hermes-workspace service.
              workspace:
                image:
                  repository: ghcr.io/outsourc-e/hermes-workspace
                  # Renovate tracks via customManager regex in renovate.json.
                  tag: "latest"
                  pullPolicy: IfNotPresent
                env:
                  # Talk to the agent over the shared Pod loopback — no Service,
                  # no cluster DNS, no cross-namespace URL. This is the whole
                  # point of the sidecar merge.
                  HERMES_API_URL: "http://127.0.0.1:8642"
                  HERMES_DASHBOARD_URL: "http://127.0.0.1:9119"
                  # Upstream-canonical paths. HERMES_HOME is the SAME PVC the
                  # agent uses (mounted here at /home/workspace/.hermes via
                  # persistence.data advancedMounts), so the UI reads the agent's
                  # skills/sessions/memory straight off disk. HERMES_WORKSPACE_DIR
                  # is the file-browser root, shared with the agent's terminal
                  # cwd (persistence.files) so tool output shows in the Files tab.
                  HERMES_HOME: "/home/workspace/.hermes"
                  HERMES_WORKSPACE_DIR: "/workspace"
                  # Behind the LAN-only NGINX ingress with cert-manager TLS.
                  # Workspace checks env values strictly as "1" (per .env.example);
                  # "true" is silently ignored and the workspace then warns
                  # "plain-HTTP LAN deployment detected" because it can't see the
                  # X-Forwarded-Proto=https header without TRUST_PROXY=1.
                  # Resulting Secure-cookie mismatch makes login fail on first POST.
                  COOKIE_SECURE: "1"
                  TRUST_PROXY: "1"
                envFrom:
                  - secretRef:
                      name: hermes-workspace-secrets
                      # Provides:
                      #   HERMES_API_TOKEN  (= API_SERVER_KEY on the agent side)
                      #   HERMES_PASSWORD   (workspace web-UI login password)
                resources:
                  limits:   { cpu: "1",    memory: 1Gi }
                  requests: { cpu: "100m", memory: 256Mi }
        service:
          app:
            controller: hermes
            ports:
              # Only the Workspace UI is exposed cluster-side. The gateway (8642)
              # and dashboard (9119) are loopback-only inside the Pod now.
              http:
                port: 3000
                targetPort: 3000
                protocol: TCP
        ingress:
          app:
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              # LAN-only (192.168.88.0/24 home + 10.1.0.0/16 k8s pod CIDR).
              nginx.ingress.kubernetes.io/whitelist-source-range: "192.168.88.0/24,10.1.0.0/16"
              # WebSocket + SSE: workspace streams chat tokens + tails terminal
              # via long-lived connections. Bump NGINX read/send timeouts so
              # idle SSE doesn't get cut at the 60s default.
              nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
              nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
            hosts:
              - host: hermes.tgu.ovh
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: app
                      port: http
            tls:
              - hosts:
                  - hermes.tgu.ovh
                secretName: hermes-tls
        persistence:
          # SHARED PVC — the agent's HERMES_HOME. Reused across the migration
          # (existing claim name "hermes-agent-data"). Mounted at /opt/data in
          # the agent and at /home/workspace/.hermes in the workspace, so both
          # see the same skills/sessions/memory tree. advancedMounts (not
          # globalMounts) because the two containers need DIFFERENT mount paths.
          data:
            type: persistentVolumeClaim
            storageClass: microk8s-hostpath
            accessMode: ReadWriteOnce
            size: 10Gi                              # NB: hostpath ignores the limit; keep 10Gi to avoid an immutable-field sync error on the existing PVC
            advancedMounts:
              hermes:
                bootstrap:
                  - path: /opt/data
                install-cli-extras:
                  - path: /opt/data
                force-gateway-autostart:
                  - path: /opt/data
                main:
                  - path: /opt/data
                workspace:
                  - path: /home/workspace/.hermes
          # File-browser root — shared by BOTH the agent (terminal.cwd below)
          # and the workspace UI (HERMES_WORKSPACE_DIR). This is the one
          # enhancement over the upstream compose: mounting it into the agent
          # too means files the agent creates via its terminal/code_execution
          # tools appear live in the workspace "Files" tab.
          files:
            type: persistentVolumeClaim
            storageClass: microk8s-hostpath
            accessMode: ReadWriteOnce
            size: 5Gi
            advancedMounts:
              hermes:
                main:
                  - path: /workspace
                workspace:
                  - path: /workspace
          bootstrap:
            type: configMap
            # bjw-s 5.0.1 merges all configMaps.* entries into a single CM
            # named after the release (here: hermes-agent), not <release>-<key>.
            name: hermes-agent
            # Mount only on the bootstrap initContainer of the hermes controller.
            advancedMounts:
              hermes:
                bootstrap:
                  - path: /bootstrap
                    readOnly: true
        configMaps:
          bootstrap:
            data:
              config.yaml: |
                # Hermes Agent config — SOURCE OF TRUTH (declarative).
                # The bootstrap initContainer overwrites $HERMES_HOME/config.yaml from
                # this block on EVERY boot. Edit HERE (Git) only — live edits via
                # kubectl/UI to the PVC copy are clobbered on the next restart.
                model:
                  # 2026-06-02: switched Qwen2.5-7B → Hermes-3-Llama-3.1-8B → Qwen3-8B.
                  #
                  # - Qwen 2.5 7B (Q4) emits tool_calls JSON on small isolated prompts
                  #   but hallucinates free text under Hermes' 16k+ system prompt.
                  # - Hermes-3-Llama-3.1-8B (Nous Research) FAILED tool calling even on
                  #   the small isolated test — likely a LocalAI tool-parser mismatch
                  #   with Hermes-3's XML grammar under automatic_tool_parsing_fallback.
                  # - Qwen3-8B is the recommendation in remoteopenclaw.com's "Best
                  #   Free Models for Hermes Agent" article (May 2026): "Best for 8 GB
                  #   VRAM, reliable tool calling". Different generation than Qwen2.5
                  #   — retrained with stronger function-call coverage.
                  default: qwen3.6-35b-a3b
                  # Named custom provider — definition is in the `providers:` block below.
                  # Using `provider: custom` (without an entry) means Hermes can't pull the
                  # API key from OPENAI_API_KEY env reliably (it sends "no-key-required"
                  # placeholder and gets 401). Named providers with key_env solve that.
                  provider: localai
                  # Hermes requires context_length >= 64000 (hard minimum, otherwise ValueError).
                  # Qwen 2.5 7B native = 32k, but we declare 64k here to satisfy Hermes' floor.
                  # Hermes compression kicks in at threshold=0.5 → starts compressing at 32k actual
                  # tokens, so real usage stays within Qwen's true window in practice.
                  # If conversations grow > 32k, LocalAI may truncate; safer long-term is to
                  # enable YaRN in LocalAI or switch to a model with native 64k+ context.
                  context_length: 65536
                # Named custom providers: Hermes resolves api_key from env var listed in key_env.
                # OPENAI_API_KEY comes from the `hermes-secrets` SealedSecret (envFrom).
                providers:
                  localai:
                    name: localai
                    base_url: http://localai.localai.svc.cluster.local:8080/v1
                    key_env: OPENAI_API_KEY
                    default_model: qwen3-8b
                agent:
                  max_turns: 90
                  gateway_timeout: 1800
                  restart_drain_timeout: 60
                  tool_use_enforcement: auto
                terminal:
                  backend: local
                  # Shared file-browser root (persistence.files, mounted in both
                  # containers). Agent tool output here is visible live in the
                  # workspace UI "Files" tab.
                  cwd: /workspace
                  timeout: 180
                display:
                  tool_progress: all
                  interim_assistant_messages: true
                browser:
                  inactivity_timeout: 120
                  command_timeout: 30
                  allow_private_urls: false
                # Route the web_search tool through self-hosted SearXNG.
                # SEARXNG_URL env (set in deployment spec) tells the plugin where to
                # POST. `search_backend` is the explicit per-capability picker;
                # `backend` is the shared fallback (both set for clarity).
                web:
                  search_backend: searxng
                  backend: searxng
                compression:
                  enabled: true
                  # Threshold MUST be tuned to LocalAI's real ceiling (32k for Qwen 2.5 7B),
                  # NOT to the declared context_length (65536). At 0.5 * 65536 = 32k,
                  # compression triggers exactly at the LocalAI overflow point, too late.
                  # 0.35 * 65536 = ~22.9k → compression starts well below the 32k ceiling,
                  # leaving ~9k of headroom for the new user turn + tool calls.
                  threshold: 0.35
                  # Tighter target_ratio: after compaction, transcript settles at
                  # 0.15 * 65536 = ~9.8k tokens (was ~13k), giving more room for the
                  # ~16k baseline system prompt + skills index.
                  target_ratio: 0.15
                  protect_last_n: 10
                  protect_first_n: 1
                # Restrict Telegram toolset: drop tts/image_gen/vision/messaging to
                # shrink the tool-schema portion of the system prompt (~2-3k tokens saved).
                # Keep web (search), browser (page fetch), file, todo, cronjob, skills,
                # terminal (curl/jq/awk/sed shell pipelines), code_execution (Python
                # sandbox: requests/httpx/json/yaml).
                # Security: TELEGRAM_ALLOWED_USERS pins the bot to user 843341688 only;
                # k8s container is non-privileged, no host mount, no sudo — terminal
                # access cannot escape the container.
                platform_toolsets:
                  telegram: [web, browser, file, todo, cronjob, skills, terminal, code_execution]
                # Disable Nous Portal as auxiliary fallback — no subscription, every
                # call returns 402 and floods logs. Hermes already throttles it after
                # the first failure (60s); this just silences the noise.
                fallback:
                  exclude: ["nous", "nous-api"]
                security:
                  redact_secrets: true
                  tirith_enabled: true
                  tirith_fail_open: true
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
