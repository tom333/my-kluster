apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # Piped — self-hosted YouTube API/proxy. Backs HA voice "joue X sur youtube"
  # + future YouTube audio on Music Assistant speakers (proxied stream).
  # API-only (no frontend). 4 components: backend + proxy + bg-helper + postgres.
  #
  # bg-helper (1337kavin/bg-helper-server) supplies PoTokens (BotGuard) — the
  # 2026 anti-bot bypass that keeps search/streams working. Backend reaches it
  # via BG_HELPER_URL in config.properties.
  #
  # Two LAN-only ingresses because the consumers are OFF-cluster on the LAN:
  #   - pipedapi.tgu.ovh   → backend (HA queries search/streams from 192.168.88.201)
  #   - pipedproxy.tgu.ovh → proxy   (cast/Nest fetch the proxied audio stream;
  #                                    must match PROXY_PART in config.properties)
  #
  # config.properties carries the DB password → whole file lives in the
  # SealedSecret piped-secrets (key: config.properties), mounted read-only.
  # Same secret holds POSTGRES_PASSWORD for the postgres container.
  name: piped
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: piped
    server: https://kubernetes.default.svc
  project: infra-project
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      values: |
        controllers:
          piped-postgres:
            type: statefulset
            containers:
              main:
                image:
                  repository: pgautoupgrade/pgautoupgrade
                  tag: "16-alpine"
                  pullPolicy: IfNotPresent
                env:
                  POSTGRES_DB: piped
                  POSTGRES_USER: piped
                  # PVC root holds lost+found on some FS → keep data in a subdir.
                  PGDATA: /var/lib/postgresql/data/pgdata
                envFrom:
                  - secretRef:
                      name: piped-secrets   # POSTGRES_PASSWORD (sealed)
                resources:
                  requests: { cpu: "50m",  memory: 128Mi }
                  limits:   { cpu: "1",    memory: 512Mi }
          piped-proxy:
            type: deployment
            containers:
              main:
                image:
                  repository: 1337kavin/piped-proxy
                  tag: latest
                  pullPolicy: IfNotPresent
                resources:
                  requests: { cpu: "20m",  memory: 32Mi }
                  limits:   { cpu: "1",    memory: 256Mi }
          piped-bg-helper:
            type: deployment
            containers:
              main:
                image:
                  repository: 1337kavin/bg-helper-server
                  tag: latest
                  pullPolicy: IfNotPresent
                resources:
                  requests: { cpu: "20m",  memory: 64Mi }
                  limits:   { cpu: "1",    memory: 512Mi }
          piped-backend:
            type: deployment
            initContainers:
              # Backend crashloops if it starts before Postgres accepts
              # connections; wait for the DB port first.
              wait-db:
                image:
                  repository: busybox
                  tag: "1.36"
                command: ["sh", "-c"]
                args:
                  - "until nc -z piped-postgres 5432; do echo waiting-for-db; sleep 2; done"
            containers:
              main:
                image:
                  repository: 1337kavin/piped
                  tag: latest
                  pullPolicy: IfNotPresent
                resources:
                  requests: { cpu: "100m", memory: 384Mi }
                  limits:   { cpu: "2",    memory: 1Gi }
        service:
          backend:
            controller: piped-backend
            ports:
              http:
                port: 8080
                targetPort: 8080
          proxy:
            controller: piped-proxy
            ports:
              http:
                port: 8080
                targetPort: 8080
          bg-helper:
            controller: piped-bg-helper
            ports:
              http:
                port: 3000
                targetPort: 3000
          piped-postgres:
            controller: piped-postgres
            ports:
              postgres:
                port: 5432
                targetPort: 5432
        ingress:
          backend:
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.middlewares: piped-lan-only@kubernetescrd
            hosts:
              - host: pipedapi.tgu.ovh
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: backend
                      port: http
            tls:
              - hosts: [pipedapi.tgu.ovh]
                secretName: pipedapi-tls
          proxy:
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.middlewares: piped-lan-only@kubernetescrd
            hosts:
              - host: pipedproxy.tgu.ovh
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: proxy
                      port: http
            tls:
              - hosts: [pipedproxy.tgu.ovh]
                secretName: pipedproxy-tls
        persistence:
          # Postgres data (hostpath ignores the size; kept for clarity).
          db:
            type: persistentVolumeClaim
            accessMode: ReadWriteOnce
            size: 2Gi
            storageClass: microk8s-hostpath
            advancedMounts:
              piped-postgres:
                main:
                  - path: /var/lib/postgresql/data
          # config.properties from the SealedSecret, mounted read-only as a file.
          config:
            type: secret
            name: piped-secrets
            advancedMounts:
              piped-backend:
                main:
                  - path: /app/config.properties
                    subPath: config.properties
                    readOnly: true
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
