apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: ia-lab
    server: https://kubernetes.default.svc
  project: datalab-project
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      values: |
        controllers:
          mlflow:
            type: deployment
            strategy: Recreate
            # Init container runs `mlflow db upgrade` before the main server boots.
            # Replaces the helm pre-install/pre-upgrade Job from the previous custom
            # chart — same effect, single pod lifecycle, idempotent on every restart.
            initContainers:
              db-migrate:
                image:
                  repository: ghcr.io/mlflow/mlflow
                  tag: "v3.12.0"
                  pullPolicy: IfNotPresent
                command:
                  - mlflow
                  - db
                  - upgrade
                  - "sqlite:///data/mlflow.db"
                env:
                  MLFLOW_S3_ENDPOINT_URL: "http://rustfs-svc:9000"
                  AWS_DEFAULT_REGION: "us-east-1"
                  AWS_ACCESS_KEY_ID:
                    valueFrom:
                      secretKeyRef:
                        name: rustfs-credentials
                        key: AWS_ACCESS_KEY_ID
                  AWS_SECRET_ACCESS_KEY:
                    valueFrom:
                      secretKeyRef:
                        name: rustfs-credentials
                        key: AWS_SECRET_ACCESS_KEY
            containers:
              main:
                image:
                  repository: ghcr.io/mlflow/mlflow
                  tag: "v3.12.0"
                  pullPolicy: IfNotPresent
                command:
                  - /bin/sh
                  - -c
                args:
                  - >-
                    pip install boto3 &&
                    mlflow server
                    --host 0.0.0.0
                    --port 5000
                    --backend-store-uri sqlite:///data/mlflow.db
                    --default-artifact-root s3://mlflow-artifacts
                    --serve-artifacts
                    --artifacts-destination s3://mlflow-artifacts
                    --allowed-hosts "mlflow.tgu.ovh"
                    --cors-allowed-origins "https://mlflow.tgu.ovh"
                env:
                  MLFLOW_S3_ENDPOINT_URL: "http://rustfs-svc:9000"
                  AWS_DEFAULT_REGION: "us-east-1"
                  AWS_ACCESS_KEY_ID:
                    valueFrom:
                      secretKeyRef:
                        name: rustfs-credentials
                        key: AWS_ACCESS_KEY_ID
                  AWS_SECRET_ACCESS_KEY:
                    valueFrom:
                      secretKeyRef:
                        name: rustfs-credentials
                        key: AWS_SECRET_ACCESS_KEY
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet: { path: /health, port: 5000 }
                      initialDelaySeconds: 120
                      periodSeconds: 10
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet: { path: /health, port: 5000 }
                      initialDelaySeconds: 120
                      periodSeconds: 20
                resources:
                  limits:   { cpu: 1000m, memory: 2Gi }
                  requests: { cpu: 250m,  memory: 1Gi }

        service:
          app:
            controller: mlflow
            ports:
              http:
                port: 5000

        ingress:
          app:
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
            hosts:
              - host: mlflow.tgu.ovh
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: app
                      port: http
            tls:
              - secretName: mlflow-tls
                hosts:
                  - mlflow.tgu.ovh

        persistence:
          data:
            # Keep the legacy PVC name so the existing SQLite DB (experiments
            # metadata) survives the chart migration. Without forceRename,
            # app-template would create a new PVC named "mlflow" and prune the
            # old "mlflow-data".
            forceRename: mlflow-data
            type: persistentVolumeClaim
            storageClass: microk8s-hostpath
            accessMode: ReadWriteOnce
            size: 10Gi
            advancedMounts:
              mlflow:
                db-migrate:
                  - path: /data
                main:
                  - path: /data

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      selfHeal: true
      prune: true
