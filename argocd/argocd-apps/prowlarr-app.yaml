apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prowlarr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: selfhost
    server: https://kubernetes.default.svc
  project: selfhost-project
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 4.6.2
    helm:
      values: |
        controllers:
          main:
            containers:
              main:
                image:
                  repository: lscr.io/linuxserver/prowlarr
                  tag: 2.3.5.5327
                env:
                  TZ: "Europe/Paris"
                  PUID: "1000"
                  PGID: "1000"
        service:
          main:
            controller: main
            ports:
              http:
                port: 9696
        ingress:
          main:
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
              nginx.ingress.kubernetes.io/auth-url: "https://auth.tgu.ovh/oauth2/auth"
              nginx.ingress.kubernetes.io/auth-signin: "https://auth.tgu.ovh/oauth2/start?rd=https://prowlarr.tgu.ovh"
            hosts:
              - host: prowlarr.tgu.ovh
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: main
                      port: http
            tls:
              - secretName: prowlarr-tls
                hosts:
                  - prowlarr.tgu.ovh
        persistence:
          config:
            type: persistentVolumeClaim
            accessMode: ReadWriteOnce
            size: 1Gi
            globalMounts:
              - path: /config
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
    automated:
      selfHeal: true
      prune: true
