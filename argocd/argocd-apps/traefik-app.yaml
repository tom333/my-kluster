apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Controller ingress Traefik, sorti de l'addon MicroK8s pour passer sous GitOps
  # (2026-06). Avant : géré par `microk8s enable ingress` (release Helm hors-Git),
  # ce qui rendait fragiles les overrides (provider compat off, updateStrategy,
  # futur plugin Sablier) — effacés à chaque disable/enable de l'addon.
  #
  # ⚠️ NE PLUS faire `microk8s enable ingress` : ArgoCD possède désormais ce release
  # `traefik` (ns ingress). L'addon et ArgoCD se battraient.
  #
  # Valeurs = copie EXACTE des user-supplied values du release adopté (helm get
  # values traefik -n ingress) → adoption sans diff ni downtime.
  #
  # Gateway API CRDs : installées hors-release (standard-install.yaml v1.4.0, via
  # l'ancien addon). Non gérées ici. À ré-appliquer manuellement en cas de rebuild
  # cluster (kubectl apply -f .../gateway-api/v1.4.0/standard-install.yaml).
  destination:
    namespace: ingress
    server: https://kubernetes.default.svc
  project: infra-project
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 41.0.1
    helm:
      releaseName: traefik
      values: |
        # Plugin Sablier (scale-to-zero) : chargé au boot depuis github (egress requis).
        # Le roll Traefik déclenché est propre grâce à updateStrategy (cf. plus bas).
        experimental:
          # Fail-closed : si un plugin n'arrive pas à charger (ex. timeout download
          # depuis plugins.traefik.io pendant un restart), Traefik REFUSE de démarrer
          # → pod CrashLoop + retry auto, au lieu de booter "Plugins are disabled"
          # (middleware globale ingress-crowdsec absente → 404 sur TOUTES les routes
          # + bouncer CrowdSec désactivé = bypass sécu). Incident 2026-06-15.
          abortOnPluginFailure: true
          plugins:
            sablier:
              moduleName: github.com/sablierapp/sablier-traefik-plugin
              version: v1.3.0
            bouncer:
              moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
              version: v1.5.0
        # Clé bouncer CrowdSec montée en fichier (SealedSecret crowdsec-bouncer-key,
        # ns ingress) → /etc/traefik/crowdsec/BOUNCER_KEY_traefik (lu par le plugin
        # via crowdsecLapiKeyFile → pas de clé en clair dans le Middleware/Git).
        volumes:
          - name: crowdsec-bouncer-key
            mountPath: /etc/traefik/crowdsec
            type: secret
        deployment:
          kind: DaemonSet
          # Cache plugins sur PVC : /plugins-storage en emptyDir = re-download des
          # plugins (bouncer/sablier) depuis plugins.traefik.io à CHAQUE recréation
          # de pod → un timeout réseau pendant ce download a tué tout l'ingress
          # (incident 2026-06-15). Sur PVC, après le 1er download les restarts sont
          # offline (plus de SPOF réseau). Volume nommé "plugins" → le chart skippe
          # son emptyDir (helper traefik.hasPluginsVolume) et utilise ce PVC.
          additionalVolumes:
            - name: plugins
              persistentVolumeClaim:
                claimName: traefik-plugins
          # microk8s-hostpath ignore fsGroup → PVC neuf reste root:root → Traefik
          # (uid 65532 nonroot, readOnlyRootFilesystem) ne peut pas écrire dans
          # /plugins-storage. Init root chown le mount (pattern volume-permissions,
          # traefik-helm-chart#396).
          initContainers:
            - name: volume-permissions
              image: busybox:1.37.0
              command: ["sh", "-c", "chown -R 65532:65532 /plugins-storage"]
              securityContext:
                runAsUser: 0
                runAsNonRoot: false
              volumeMounts:
                - name: plugins
                  mountPath: /plugins-storage
        # DaemonSet en hostPort 80/443 : le défaut maxSurge=1/maxUnavailable=0 deadlock
        # au rolling-update (nouveau pod Pending car port pris, ancien ne meurt pas).
        # Recreate (delete old → new) → upgrades Traefik (ex. futur plugin Sablier)
        # sans delete pod manuel. Bref blip ingress par upgrade (single-node), pas de deadlock.
        updateStrategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 1
            maxSurge: 0
        # Monte le PVC plugins (déclaré dans deployment.additionalVolumes) sur le
        # chemin de stockage des plugins. Clé top-level (PAS sous deployment).
        additionalVolumeMounts:
          - name: plugins
            mountPath: /plugins-storage
        extraObjects:
          # PVC du cache plugins Traefik (cf. deployment.additionalVolumes).
          - apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: traefik-plugins
              namespace: ingress
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: microk8s-hostpath
              resources:
                requests:
                  storage: 256Mi
          - apiVersion: networking.k8s.io/v1
            kind: IngressClass
            metadata:
              name: public
              annotations:
                ingressclass.kubernetes.io/is-default-class: "true"
            spec:
              controller: traefik.io/ingress-controller
          - apiVersion: networking.k8s.io/v1
            kind: IngressClass
            metadata:
              name: nginx
            spec:
              controller: traefik.io/ingress-controller
        gateway:
          listeners:
            web:
              namespacePolicy:
                from: All
        ingressClass:
          enabled: true
          isDefaultClass: false
          name: traefik
        ingressRoute:
          dashboard:
            enabled: true
            entryPoints:
              - web
            matchRule: Host(`dashboard.localhost`)
        logs:
          general:
            level: INFO
            # JSON : enlève les codes couleur ANSI (\x1b) qui cassaient le parser CrowdSec.
            format: json
          # Access logs requis pour l'acquisition CrowdSec. Format JSON : le parser
          # crowdsecurity/traefik fait un UnmarshalJSON → exige du JSON (pas du CLF).
          access:
            enabled: true
            format: json
        ports:
          web:
            exposedPort: 80
            hostPort: 80
            port: 8000
            protocol: TCP
            # Exempte les routes challenge ACME du redirect → cert-manager HTTP-01
            # (renouvellement des certs) continue de fonctionner sur http.
            allowACMEByPass: true
            # Redirect global http→https (301 permanent). Tout le reste passe en TLS.
            # v40 : redirections déplacé sous ports.web.http (était ports.web.redirections).
            http:
              redirections:
                entryPoint:
                  to: websecure
                  scheme: https
                  permanent: true
          websecure:
            exposedPort: 443
            hostPort: 443
            port: 8443
            protocol: TCP
            # Attache GLOBALE du bouncer CrowdSec : bloque les IPs bannies sur TOUT
            # le trafic HTTPS, avant les middlewares par-router (oauth/whitelist/sablier).
            # Plugin validé sain (pull LAPI OK) avant cette attache (sinon 404 global).
            # v40 : middlewares déplacé sous ports.websecure.http (était ports.websecure.middlewares).
            http:
              middlewares:
                - ingress-crowdsec@kubernetescrd
        # Service en ClusterIP (défaut chart = LoadBalancer) : sur single-node
        # hostPort, le trafic externe entre par le port 80/443 du node, PAS par le
        # Service. Un type LoadBalancer reste sans IP externe (pas de MetalLB) →
        # ArgoCD juge le Service "Progressing" à vie → app traefik jamais Healthy.
        service:
          type: ClusterIP
        # IP statique recopiée dans status.loadBalancer de TOUTES les Ingress
        # (node single-node 192.168.88.250). Remplace publishedService (LB sans IP).
        # → ArgoCD juge les Ingress Healthy (sinon "Progressing"/pending perpétuel).
        # Exclusif avec providers.kubernetesIngress.publishedService (désactivé).
        additionalArguments:
          - "--providers.kubernetesingress.ingressendpoint.ip=192.168.88.250"
        providers:
          kubernetesGateway:
            enabled: true
          kubernetesIngress:
            allowEmptyServices: true
            enabled: true
            # publishedService désactivé : le Service traefik est LoadBalancer mais
            # sans IP externe (single-node, pas de MetalLB) → status.loadBalancer vide
            # → rien à recopier sur les Ingress → ArgoCD les voit "Progressing" à vie.
            # On publie une IP statique (node) via additionalArguments (cf. bas du fichier).
            publishedService:
              enabled: false
          # v40 : provider kubernetesIngressNginx RETIRÉ du chart (n'existe plus dans
          # le schéma). Était déjà enabled:false → aucun router nginx-compat généré,
          # rien à migrer. (La clé déclenchait une ComparisonError schema sur le bump v40.)
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    automated:
      selfHeal: true
      prune: true
      allowEmpty: true
