apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Controller ingress Traefik, sorti de l'addon MicroK8s pour passer sous GitOps
  # (2026-06). Avant : géré par `microk8s enable ingress` (release Helm hors-Git),
  # ce qui rendait fragiles les overrides (provider compat off, updateStrategy,
  # futur plugin Sablier) — effacés à chaque disable/enable de l'addon.
  #
  # ⚠️ NE PLUS faire `microk8s enable ingress` : ArgoCD possède désormais ce release
  # `traefik` (ns ingress). L'addon et ArgoCD se battraient.
  #
  # Valeurs = copie EXACTE des user-supplied values du release adopté (helm get
  # values traefik -n ingress) → adoption sans diff ni downtime.
  #
  # Gateway API CRDs : installées hors-release (standard-install.yaml v1.4.0, via
  # l'ancien addon). Non gérées ici. À ré-appliquer manuellement en cas de rebuild
  # cluster (kubectl apply -f .../gateway-api/v1.4.0/standard-install.yaml).
  destination:
    namespace: ingress
    server: https://kubernetes.default.svc
  project: infra-project
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 37.4.0
    helm:
      releaseName: traefik
      values: |
        # Plugin Sablier (scale-to-zero) : chargé au boot depuis github (egress requis).
        # Le roll Traefik déclenché est propre grâce à updateStrategy (cf. plus bas).
        experimental:
          plugins:
            sablier:
              moduleName: github.com/sablierapp/sablier-traefik-plugin
              version: v1.3.0
            bouncer:
              moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
              version: v1.5.0
        # Clé bouncer CrowdSec montée en fichier (SealedSecret crowdsec-bouncer-key,
        # ns ingress) → /etc/traefik/crowdsec/BOUNCER_KEY_traefik (lu par le plugin
        # via crowdsecLapiKeyFile → pas de clé en clair dans le Middleware/Git).
        volumes:
          - name: crowdsec-bouncer-key
            mountPath: /etc/traefik/crowdsec
            type: secret
        deployment:
          kind: DaemonSet
        # DaemonSet en hostPort 80/443 : le défaut maxSurge=1/maxUnavailable=0 deadlock
        # au rolling-update (nouveau pod Pending car port pris, ancien ne meurt pas).
        # Recreate (delete old → new) → upgrades Traefik (ex. futur plugin Sablier)
        # sans delete pod manuel. Bref blip ingress par upgrade (single-node), pas de deadlock.
        updateStrategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 1
            maxSurge: 0
        extraObjects:
          - apiVersion: networking.k8s.io/v1
            kind: IngressClass
            metadata:
              name: public
              annotations:
                ingressclass.kubernetes.io/is-default-class: "true"
            spec:
              controller: traefik.io/ingress-controller
          - apiVersion: networking.k8s.io/v1
            kind: IngressClass
            metadata:
              name: nginx
            spec:
              controller: traefik.io/ingress-controller
        gateway:
          listeners:
            web:
              namespacePolicy:
                from: All
        ingressClass:
          enabled: true
          isDefaultClass: false
          name: traefik
        ingressRoute:
          dashboard:
            enabled: true
            entryPoints:
              - web
            matchRule: Host(`dashboard.localhost`)
        logs:
          general:
            level: INFO
            # JSON : enlève les codes couleur ANSI (\x1b) qui cassaient le parser CrowdSec.
            format: json
          # Access logs requis pour l'acquisition CrowdSec. Format JSON : le parser
          # crowdsecurity/traefik fait un UnmarshalJSON → exige du JSON (pas du CLF).
          access:
            enabled: true
            format: json
        ports:
          web:
            exposedPort: 80
            hostPort: 80
            port: 8000
            protocol: TCP
            # Exempte les routes challenge ACME du redirect → cert-manager HTTP-01
            # (renouvellement des certs) continue de fonctionner sur http.
            allowACMEByPass: true
            # Redirect global http→https (301 permanent). Tout le reste passe en TLS.
            redirections:
              entryPoint:
                to: websecure
                scheme: https
                permanent: true
          websecure:
            exposedPort: 443
            hostPort: 443
            port: 8443
            protocol: TCP
            # Attache GLOBALE du bouncer CrowdSec : bloque les IPs bannies sur TOUT
            # le trafic HTTPS, avant les middlewares par-router (oauth/whitelist/sablier).
            # Plugin validé sain (pull LAPI OK) avant cette attache (sinon 404 global).
            middlewares:
              - ingress-crowdsec@kubernetescrd
        providers:
          kubernetesGateway:
            enabled: true
          kubernetesIngress:
            allowEmptyServices: true
            enabled: true
            publishedService:
              enabled: true
          # Désactivé : sinon routers dupliqués non-protégés (bypass auth).
          kubernetesIngressNginx:
            enabled: false
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    automated:
      selfHeal: true
      prune: true
      allowEmpty: true
