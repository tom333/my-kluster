apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: termix
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Terminal web "shell.tgu.ovh" : Termix (https://github.com/Termix-SSH/Termix),
  # remplace ttyd (cf. ttyd-app.yaml.disable). Gestionnaire SSH web complet :
  # terminal, tunnels, file manager, multi-hosts. Auth interne Termix (users/2FA)
  # + credentials SSH stockés dans SQLite chiffrée (PVC /app/data).
  # Connexion au host : SSH moi@192.168.88.250 (hop LAN, port SSH jamais WAN) —
  # réutiliser la clé ttyd-ssh-key (pubkey déjà restreinte from=cluster/LAN dans
  # authorized_keys du host), à coller dans l'UI Termix au premier setup.
  # guacd (RDP/VNC) volontairement non déployé — besoin = SSH uniquement.
  #
  # SÉCURITÉ : aucun accès sans login GitHub (Middleware oauth2-forwardauth,
  # whitelist tom333/tguyader) + login Termix + CrowdSec global (websecure) + TLS.
  destination:
    namespace: shell
    server: https://kubernetes.default.svc
  project: infra-project
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      values: |
        controllers:
          termix:
            type: deployment
            strategy: Recreate
            containers:
              main:
                image:
                  repository: ghcr.io/lukegus/termix
                  tag: release-2.3.2
                  pullPolicy: IfNotPresent
                env:
                  PORT: "8080"
                resources:
                  limits:   { cpu: "500m", memory: 512Mi }
                  requests: { cpu: "50m",  memory: 128Mi }
        service:
          app:
            controller: termix
            ports:
              http:
                port: 8080
        ingress:
          app:
            className: public
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
              traefik.ingress.kubernetes.io/router.middlewares: shell-oauth2-forwardauth@kubernetescrd
            hosts:
              - host: shell.tgu.ovh
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: app
                      port: http
            tls:
              - secretName: shell-tls
                hosts:
                  - shell.tgu.ovh
        persistence:
          data:
            type: persistentVolumeClaim
            accessMode: ReadWriteOnce
            size: 1Gi
            globalMounts:
              - path: /app/data
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
