apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arr-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: selfhost-project
  destination:
    server: https://kubernetes.default.svc
    namespace: selfhost
  source:
    repoURL: https://github.com/tom333/arr-stack.git
    targetRevision: v0.2.6
    path: charts/arr-stack
    helm:
      valueFiles:
        - ../../examples/values-prod.yaml
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true        # MANDATORY: Deployment selector immutability — instance label changes at cutover (RESEARCH §"Standard Stack")
    automated:
      prune: true
      selfHeal: true
