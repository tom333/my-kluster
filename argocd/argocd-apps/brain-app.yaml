apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: brain
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: brain
    server: https://kubernetes.default.svc
  project: datalab-project
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      values: |
        # SilverBullet = interface web du vault second-brain (tom333/brain).
        # Espace = clone git sur PVC ; sidecar git-sync (pull/commit/push) → les
        # edits web remontent dans git, les changements git (Claude /save, autres
        # postes) redescendent dans le web. Ingress PUBLIC + oauth2 (hors-LAN, gate
        # GitHub). Cf docs/superpowers/specs/2026-07-20-second-brain-vault-design.md.
        controllers:
          brain:
            type: deployment
            strategy: Recreate
            pod:
              # microk8s-hostpath ignore fsGroup → on tourne root pour que SB (edits)
              # et le sidecar git (clone/commit) partagent /space sans conflit d'uid.
              securityContext:
                runAsUser: 0
                runAsGroup: 0
            initContainers:
              clone:
                image:
                  repository: alpine/git
                  tag: latest   # TODO Renovate: pin
                  pullPolicy: IfNotPresent
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -e
                    K=/tmp/id; cp /keys/ssh-privatekey "$K"; chmod 600 "$K"
                    export GIT_SSH_COMMAND="ssh -i $K -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
                    git config --global --add safe.directory /space
                    if [ -d /space/.git ]; then
                      cd /space && git pull --rebase --autostash || true
                    else
                      git clone git@github.com:tom333/brain.git /space
                    fi
            containers:
              main:
                image:
                  repository: ghcr.io/silverbulletmd/silverbullet
                  tag: "2.9.0"
                  pullPolicy: IfNotPresent
                env:
                  SB_FOLDER: /space
                resources:
                  limits:   { cpu: "1", memory: 512Mi }
                  requests: { cpu: "50m", memory: 128Mi }
              git-sync:
                image:
                  repository: alpine/git
                  tag: latest   # TODO Renovate: pin
                  pullPolicy: IfNotPresent
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    K=/tmp/id; cp /keys/ssh-privatekey "$K"; chmod 600 "$K"
                    export GIT_SSH_COMMAND="ssh -i $K -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
                    git config --global user.email "brain@tgu.ovh"
                    git config --global user.name "SilverBullet"
                    git config --global --add safe.directory /space
                    cd /space
                    while true; do
                      if [ -n "$(git status --porcelain)" ]; then
                        git add -A && git commit -q -m "sb: web edits $(date -u +%FT%TZ)" || true
                      fi
                      git pull --rebase --autostash -q || true
                      git push -q || true
                      sleep 20
                    done
                resources:
                  limits:   { cpu: "200m", memory: 128Mi }
                  requests: { cpu: "10m", memory: 32Mi }
        service:
          app:
            controller: brain
            ports:
              http:
                port: 3000
        ingress:
          app:
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
              # PUBLIC + oauth2 forwardauth (aucun accès sans login GitHub). Pas de
              # lan-only : accès hors-LAN voulu (usage 50/50).
              traefik.ingress.kubernetes.io/router.middlewares: brain-oauth2-forwardauth@kubernetescrd
            hosts:
              - host: brain.tgu.ovh
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: app
                      port: http
            tls:
              - secretName: brain-tls
                hosts:
                  - brain.tgu.ovh
        persistence:
          space:
            type: persistentVolumeClaim
            storageClass: microk8s-hostpath
            accessMode: ReadWriteOnce
            size: 2Gi
            globalMounts:
              - path: /space
          deploy-key:
            type: secret
            name: brain-git-deploy-key
            globalMounts:
              - path: /keys
                readOnly: true
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
