apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rustfs
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: ia-lab
    server: https://kubernetes.default.svc
  project: datalab-project
  source:
    repoURL: https://github.com/rustfs/rustfs
    targetRevision: 1.0.0-beta.3
    path: helm/rustfs
    helm:
      values: |
        # Mode de déploiement
        mode:
          standalone:
            enabled: true
          distributed:
            enabled: false
        
        replicaCount: 1
        
        image:
          repository: rustfs/rustfs
          tag: "1.0.0-beta.3"
          pullPolicy: IfNotPresent
        
        # Configuration RustFS
        config:
          rustfs:
            address: ":9000"
            console_address: ":9001"
            console_enable: "true"
            region: "us-east-1"
            log_level: "info"
            rust_log: "info"
            obs_environment: "production"
            obs_log_directory: "/logs"
        
        secret:
          existingSecret: "rustfs-credentials"
        
        service:
          type: ClusterIP
          endpoint:
            port: 9000
          console:
            port: 9001
        
        ingress:
          enabled: true
          className: nginx
          hosts:
            - host: rustfs.tgu.ovh
              paths:
                - path: /
                  pathType: ImplementationSpecific
          nginxAnnotations:
            cert-manager.io/cluster-issuer: "letsencrypt-prod"
            # Annotations nginx retirées (migration Traefik 2026-06) :
            # - sticky session (affinity/session-cookie) inutile → rustfs = 1 replica
            # - proxy timeouts inutiles → Traefik ne coupe pas les uploads longs par
            #   défaut (contrairement au 60s nginx). À porter en ServersTransport
            #   seulement si un cas réel de coupure apparaît.
          tls:
            enabled: true
            # Skip le template secret-tls.yaml du chart (qui crée un Secret bidon
            # crt="tls.crt"/key="tls.key" et fait reboucler cert-manager → 429 LE).
            # Le Secret rustfs-tls sera géré uniquement par cert-manager.
            certManager:
              enabled: true
        
        # StorageClass et PVC
        storageclass:
          name: microk8s-hostpath
          dataStorageSize: 20Gi
          logStorageSize: 2Gi
        
        resources:
          limits:
            cpu: 1000m
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      selfHeal: true
      prune: true
