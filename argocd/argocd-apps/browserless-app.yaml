apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # Headless Chromium (browserless v2) for the Hermes agent's browser/scraping tool.
  # The EKKOLearn all-in-one image (FROM nousresearch/hermes-agent) does NOT ship a
  # usable Chromium (Node swap + changed HOME + entrypoint override break the base
  # image's bundled browser). Rather than bloat the agent image, Hermes connects to
  # this standalone Chromium over CDP: set `browser.cdp_url` in the agent config to
  # http://browserless.hermes.svc.cluster.local:3000 (see hermes-agent-app.yaml).
  #
  # Tokenless on purpose: ClusterIP only, NO ingress — CDP ≈ RCE, never expose it.
  # Runs non-root (image user blessuser, uid 999). /dev/shm sized up (Chromium
  # crashes on the 64MB default). Same namespace as the agent so the Service DNS is
  # short and traffic stays in-cluster.
  name: browserless
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: hermes
    server: https://kubernetes.default.svc
  project: infra-project
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 5.0.1
    helm:
      values: |
        controllers:
          browserless:
            type: deployment
            pod:
              securityContext:
                runAsNonRoot: true
                runAsUser: 999
                runAsGroup: 999
            containers:
              main:
                image:
                  repository: ghcr.io/browserless/chromium
                  tag: "v2.23.0"
                  pullPolicy: IfNotPresent
                env:
                  # No TOKEN → tokenless (cluster-internal only). Sizing for a
                  # single-user homelab; HEALTH rejects new sessions under pressure.
                  # EXTERNAL_URL: /json/version advertises webSocketDebuggerUrl using
                  # this host. Without it browserless reports ws://0.0.0.0:3000, which
                  # Hermes' CDP discovery uses verbatim → unconnectable. Must match the
                  # in-cluster Service DNS the agent dials.
                  EXTERNAL_URL: "http://browserless.hermes.svc.cluster.local:3000"
                  CONCURRENT: "3"
                  QUEUED: "5"
                  TIMEOUT: "120000"
                  HEALTH: "true"
                  MAX_CPU_PERCENT: "80"
                  MAX_MEMORY_PERCENT: "80"
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /active
                        port: 3000
                      initialDelaySeconds: 20
                      periodSeconds: 30
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /active
                        port: 3000
                      initialDelaySeconds: 5
                      periodSeconds: 10
                resources:
                  # Node CPU-requests are near-saturated (single node ~5 CPU). Keep the
                  # request tiny — Chromium is bursty and idle most of the time — and let
                  # the limit absorb spikes.
                  requests: { cpu: "100m", memory: 1Gi }
                  limits:   { cpu: "2",    memory: 4Gi }
        service:
          app:
            controller: browserless
            ports:
              http:
                port: 3000
                targetPort: 3000
        persistence:
          # /dev/shm — Chromium needs more than the 64MB default or it crashes.
          # emptyDir medium=Memory counts against the pod memory limit (4Gi > 2Gi shm).
          dshm:
            type: emptyDir
            medium: Memory
            sizeLimit: 2Gi
            globalMounts:
              - path: /dev/shm
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
