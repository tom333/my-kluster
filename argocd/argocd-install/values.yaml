argo-cd:
  installCRDs: true
  dex:
    enabled: false
  redis-ha:
    enabled: false
    
  controller:
    replicas: 1
  repoServer:
    replicas: 1

  applicationSet:
    replicas: 1
  server:
    replicas: 1
    # insecure géré via configs.params.server.insecure (cf. plus bas) — PAS via
    # extraArgs : le chart pilote le port backend de l'ingress sur ce param
    # (templates/argocd-server/ingress.yaml : servicePort = insecure ? http(80) : https(443)).
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
      extraTls:
        - hosts:
          - argocd.tgu.ovh
          secretName: argocd-tls
    env: 
      - name: ARGOCD_EXEC_TIMEOUT
        value: 10m
  certificate:
    enabled: true
  global:
    domain: argocd.tgu.ovh
  configs:
    cm:
      kustomize.buildOptions: "--enable-helm --load-restrictor=LoadRestrictionsNone"
    params:
      # argocd-server sert en HTTP cleartext (TLS terminé par Traefik/cert-manager).
      # Pilote AUSSI le port backend de l'ingress vers "http" (80) au lieu de "https"
      # (443). Sous Traefik, viser 443 (nommé https) faisait parler TLS à un backend
      # cleartext → 502. Cf. docs/superpowers/plans/2026-06-09-traefik-ingress-migration.md.
      server.insecure: true


