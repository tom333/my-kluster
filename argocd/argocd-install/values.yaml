argo-cd:
  installCRDs: true
  dex:
    enabled: false
  redis-ha:
    enabled: false
    
  controller:
    replicas: 1
  repoServer:
    replicas: 1

  applicationSet:
    replicas: 1
  server:
    replicas: 1
    extraArgs:
      - --insecure
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        # argocd-server tourne en --insecure → sert HTTP/1.1 cleartext sur 8080.
        # Le backend ingress cible le port service 443 (nommé "https") → Traefik
        # appliquerait l'heuristique HTTPS et parlerait TLS à un backend cleartext
        # (502). serversscheme=http force le HTTP/1.1 cleartext (le backend ne
        # parle pas h2c sur ce port ; UI OK, CLI via --grpc-web).
        traefik.ingress.kubernetes.io/service.serversscheme: http
      extraTls:
        - hosts:
          - argocd.tgu.ovh
          secretName: argocd-tls
    env: 
      - name: ARGOCD_EXEC_TIMEOUT
        value: 10m
  certificate:
    enabled: true
  global:
    domain: argocd.tgu.ovh
  configs:
    cm:
      kustomize.buildOptions: "--enable-helm --load-restrictor=LoadRestrictionsNone"


